domain: variables
title: "Variables, Placeholders & Dynamic Injection"
doc: ../docs/spec.md
files:
  claude:
    - ".claude/skills/<name>/SKILL.md"
    - ".claude/commands/<name>.md"
    - "~/.claude/skills/<name>/SKILL.md"
  codex:
    - ".agents/skills/<name>/SKILL.md"
    - "~/.agents/skills/<name>/SKILL.md"
    - "(Custom Prompts: deprecated; invoked via /prompts:name)"
format:
  claude: [markdown+yaml-frontmatter]
  codex: [markdown+yaml-frontmatter]
entries:
  - id: variables.arguments-all
    claude:
      field: "$ARGUMENTS"
      type: "string"
      scope: skill
    codex:
      field: "$ARGUMENTS"
      type: "string"
      scope: skill
    direction: both
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: |
      The syntax is identical on both sides, but in Codex $ARGUMENTS is documented as valid
      only in Custom Prompts (deprecated); $ARGUMENTS expansion in Skill bodies (SKILL.md)
      is not described in official documentation and no expansion logic exists in
      render.rs/injection.rs (likely unsupported).
      When converting Claude→Codex Skills, issue an explicit warning:
      "$ARGUMENTS is likely not expanded in Skill bodies."
      Codex→Claude is lossless in principle, but since the Codex side is non-functional
      in a Skill→Skill conversion context, treat as lossy.
    source: "https://developers.openai.com/codex/custom-prompts"

  - id: variables.arguments-indexed
    claude:
      field: "$ARGUMENTS[N]"
      type: "string"
      scope: skill
    codex:
      field: "$N+1"
      type: "string"
      scope: skill
    direction: both
    loss: lossy
    degrade: null
    transform: "index_shift:+1"
    warn: true
    notes: |
      Claude is 0-indexed ($ARGUMENTS[0] is the first argument); Codex (Custom Prompts) is
      1-indexed ($1 is the first argument). Claude→Codex: use N+1; Codex→Claude: use N-1.
      Index offset is the most critical pitfall.
      Always enumerate the before/after indices in the conversion report.
      In Codex, only Custom Prompts support this; Skill bodies do not.
    source: "https://developers.openai.com/codex/custom-prompts"

  - id: variables.positional-shorthand
    claude:
      field: "$N ($0, $1, $2, …; 0-indexed shorthand)"
      type: "string"
      scope: skill
    codex:
      field: "$N+1 ($1, $2, $3, …; 1-indexed)"
      type: "string"
      scope: skill
    direction: both
    loss: lossy
    degrade: null
    transform: "index_shift:+1"
    warn: true
    notes: |
      Shorthand for $ARGUMENTS[N]. Claude is 0-indexed: $0 = first, $1 = second.
      Codex (Custom Prompts) is 1-indexed: $1 = first, $2 = second.
      Claude→Codex: $0→$1, $1→$2. Codex→Claude: $1→$0, $2→$1.
      Codex Skill bodies do not support this (Custom Prompts only).
    source: "https://developers.openai.com/codex/custom-prompts"

  - id: variables.named
    claude:
      field: "$name (named argument declared in frontmatter arguments:)"
      type: "string"
      scope: skill
    codex:
      field: "$UPPERCASE_NAME (KEY=value call syntax)"
      type: "string"
      scope: skill
    direction: both
    loss: lossy
    degrade: null
    transform: "rename"
    warn: true
    notes: |
      Claude named arguments are declared in the frontmatter's arguments: field and
      expanded via positional passing like /skill-name foo ($name→foo).
      Codex (Custom Prompts) passes them as KEY=value (/prompts:name KEY=foo)
      and expands to $UPPERCASE_NAME (variable name in uppercase).
      At conversion time, apply rename (lowercase→uppercase) and also update
      the invocation documentation syntax.
      Codex Skill bodies do not perform pre-processing substitution.
    source: "https://developers.openai.com/codex/custom-prompts"

  - id: variables.session-id
    claude:
      field: "${CLAUDE_SESSION_ID}"
      type: "string"
      scope: session
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: |
      No equivalent session ID variable exists in Codex. If left after conversion as a
      literal string, it risks silent misbehavior. Detect via body scanner, list with
      line numbers in the conversion report, and prompt manual handling.
      This is a Claude-specific extension not included in the Agent Skills standard (agentskills.io).
    source: "https://code.claude.com/docs/en/skills"

  - id: variables.effort-var
    claude:
      field: "${CLAUDE_EFFORT}"
      type: "string"
      scope: session
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: |
      No equivalent effort variable exists in Codex. If left as a literal after conversion,
      it will cause misbehavior.
      Detect via body scanner and list in the conversion report.
    source: "https://code.claude.com/docs/en/skills"

  - id: variables.skill-dir
    claude:
      field: "${CLAUDE_SKILL_DIR}"
      type: "string"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: |
      No equivalent skill directory variable exists in Codex. Any processing that
      references the path must be manually hardcoded or replaced by another method.
      List in the conversion report.
    source: "https://code.claude.com/docs/en/skills"

  - id: variables.project-dir
    claude:
      field: "${CLAUDE_PROJECT_DIR}"
      type: "string"
      scope: project
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: |
      No equivalent project directory variable exists in Codex.
      In Codex, a separate script referencing environment variables such as
      $PWD or $REPO_ROOT may serve as an alternative. List in the conversion report.
    source: "https://code.claude.com/docs/en/skills"

  - id: variables.plugin-root
    claude:
      field: "${CLAUDE_PLUGIN_ROOT}"
      type: "string"
      scope: plugin
    codex:
      field: "PLUGIN_ROOT (also exposed as ${CLAUDE_PLUGIN_ROOT} compat alias)"
      type: "string"
      scope: plugin
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: |
      Codex sets PLUGIN_ROOT (and the compat alias CLAUDE_PLUGIN_ROOT) in plugin-sourced
      hook commands. This mapping is therefore lossless within that specific scope.
      IMPORTANT scope restriction: this variable is only available inside plugin-sourced hook
      commands. In general skill bodies (SKILL.md), ${CLAUDE_PLUGIN_ROOT} is NOT set by Codex
      and must still be treated as unsupported. The body scanner (scanner/body.rs) does not
      yet distinguish plugin-hook context from skill-body context; until that is fixed,
      occurrences in skill bodies should be reported as unsupported. See maintainer note in
      /tmp/issue29_followup.txt.
    source: "https://developers.openai.com/codex/plugins/build"

  - id: variables.plugin-data
    claude:
      field: "${CLAUDE_PLUGIN_DATA}"
      type: "string"
      scope: plugin
    codex:
      field: "PLUGIN_DATA (also exposed as ${CLAUDE_PLUGIN_DATA} compat alias)"
      type: "string"
      scope: plugin
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: |
      Codex sets PLUGIN_DATA (and the compat alias CLAUDE_PLUGIN_DATA) in plugin-sourced
      hook commands. This mapping is therefore lossless within that specific scope.
      IMPORTANT scope restriction: identical to variables.plugin-root — this variable is
      only available inside plugin-sourced hook commands. In general skill bodies (SKILL.md),
      ${CLAUDE_PLUGIN_DATA} is NOT set by Codex. The body scanner caveat from
      variables.plugin-root applies here too.
    source: "https://developers.openai.com/codex/plugins/build"

  - id: variables.inline-injection
    claude:
      field: "!`cmd` (inline dynamic shell injection at line start or after whitespace)"
      type: "string"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: |
      Claude-specific dynamic shell injection. Executes a shell command before the skill
      is passed to Claude and replaces the body with the stdout. Codex rejected implementation
      as "not planned" in Issue #5019.
      If left unconverted, it is treated as literal text and behavior silently breaks (high risk).
      Body scanner regex: ^!`[^`]+` and ^[ \t]+!`[^`]+`
      The conversion CLI must list detected line numbers and command contents in the
      conversion report and prompt manual handling.
      Do not auto-delete, as that would cause significant information loss.
      Can also be disabled via disableSkillShellExecution.
    source: "https://code.claude.com/docs/en/skills"

  - id: variables.block-injection
    claude:
      field: "```! block (block dynamic shell injection)"
      type: "string"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: |
      Claude-specific block dynamic shell injection. Executes the entire fenced code block
      starting with ```! as a command and replaces the block with stdout.
      Codex rejected implementation as "not planned" in Issue #5019.
      If left unconverted, it is treated as a literal and causes misbehavior (high risk).
      Body scanner regex: ^```!$
      As with inline-injection, the conversion CLI must detect, list, and prompt manual handling.
    source: "https://code.claude.com/docs/en/skills"

  - id: variables.dollar-escape
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "$$ (escape sequence for literal $)"
      type: "string"
      scope: skill
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: |
      In Codex Custom Prompts, $$ is an escape sequence that expands to a literal $.
      No equivalent escape mechanism exists on the Claude side.
      In Codex→Claude conversion, convert $$ to $, but since this may collide with
      Claude variable syntax (e.g. $name), list in the conversion report and prompt
      collision verification.
    source: "https://developers.openai.com/codex/custom-prompts"

  - id: variables.invocation-slash
    claude:
      field: "/skill-name [args] (invocation syntax in body/README)"
      type: "string"
      scope: skill
    codex:
      field: "$skill-name (invocation syntax in body/README)"
      type: "string"
      scope: skill
    direction: both
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: |
      Claude's /skill-name ⇄ Codex's $skill-name. Invocation syntax in body and README
      is also subject to conversion.
      $ collides with shell variables and / collides with path separators, so automatic
      replacement carries a high risk of false positives.
      It is safer for the conversion CLI to detect and propose replacements
      (prompt user confirmation rather than auto-applying).
      Body scanner regex: \$[\w-]+ (Codex→Claude detection)
      Also warn that arguments passed via $skill-name syntax are not expanded in
      Codex Skill bodies.
    source: "https://code.claude.com/docs/en/skills"

  - id: variables.invocation-namespaced
    claude:
      field: "/plugin:skill (namespaced invocation syntax)"
      type: "string"
      scope: plugin
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: |
      Claude's plugin namespace syntax /plugin:skill has no equivalent in Codex.
      At conversion time, choose between stripping the plugin namespace and converting
      to $skill syntax, or dropping and requiring manual handling.
      Stripping the namespace risks collision when multiple skills share the same name,
      so note the possibility of collision in the conversion report.
      Body scanner regex: /[\w-]+:[\w-]+
    source: "https://code.claude.com/docs/en/skills"

notes:
  - "Codex Skill bodies (SKILL.md) have no pre-processing variable substitution logic (no expansion code in render.rs/injection.rs). All variable expansion including $ARGUMENTS is valid only in Custom Prompts (deprecated); in a Skill→Skill conversion, effectively all variable syntax becomes non-functional."
  - "Index offset (0-indexed vs 1-indexed) is the most easily overlooked and most severe pitfall in machine translation. A missed index_shift:+1 application invariably becomes a silent logic bug."
  - "Dynamic shell injection (!`cmd` / ```! blocks) was explicitly declared 'not planned' in Codex Issue #5019. If left unconverted they become literals and cause misbehavior; it is recommended that the conversion CLI treat detected cases as requiring the user to manually handle them before proceeding."
  - "The Agent Skills standard (agentskills.io) does not include variables or dynamic injection specifications. These are proprietary extensions on both sides and are not part of open-standard-based interoperability."
  - "Codex Custom Prompts ($ARGUMENTS/$1-$9/$$) are officially deprecated as of 2026. OpenAI recommends migrating all Custom Prompt usage to Skills. The $ARGUMENTS/$N/$$ entries above apply only to that deprecated path; in a Skill→Skill conversion they are effectively non-functional. Do not use Custom Prompts as a conversion intermediary except as a short-term transitional workaround."
  - "The Codex-side specification is fluid (new features from 2025-2026). In particular, $ARGUMENTS support in Skill bodies may change in the future. Verify version dependencies against the source URL."
  - "variables.plugin-root and variables.plugin-data are lossless ONLY inside plugin-sourced hook commands (Codex sets PLUGIN_ROOT/PLUGIN_DATA env vars there). In general Skill bodies these variables remain unsupported by Codex; the body scanner must be extended to distinguish these two contexts before reporting them as safe."
