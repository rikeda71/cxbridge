domain: subagents
title: "Subagents (agents/*.md / agents/*.toml)"
doc: ../docs/spec.md
files:
  claude:
    - ".claude/agents/<name>.md"
    - "~/.claude/agents/<name>.md"
  codex:
    - ".codex/agents/<name>.toml"
    - "~/.codex/agents/<name>.toml"
    - ".codex/config.toml ([agents.<name>] section)"
format:
  claude: [markdown+yaml-frontmatter]
  codex: [toml]
entries:
  - id: subagents.path
    claude:
      field: "（ディレクトリパス + .md）"
      type: "path"
      scope: agent
    codex:
      field: "（ディレクトリパス + .toml）"
      type: "path"
      scope: subagent
    direction: both
    loss: lossless
    degrade: null
    transform: "path:remap; rename"
    warn: false
    notes: "`.claude/agents/<name>.md` ⇄ `.codex/agents/<name>.toml` のパス付け替え + 拡張子変換（.md ⇄ .toml）+ ファイル形式変換（markdown+yaml-frontmatter ⇄ toml）。ディレクトリ再帰探索は両者とも対応。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.name
    claude:
      field: "name"
      type: "string"
      scope: agent
    codex:
      field: "name"
      type: "string"
      scope: subagent
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "両者とも必須フィールド。Claude 側は kebab-case が推奨、lowercase 英数ハイフン慣習あり。Codex 側の命名制約は緩いが ASCII 英数字・スペース・ハイフン・アンダースコアが安全。Claude の name は hooks の agent_type としても使われる。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.description
    claude:
      field: "description"
      type: "string"
      scope: agent
    codex:
      field: "description"
      type: "string"
      scope: subagent
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "両者とも必須フィールド。Claude 側は description のセマンティックマッチによる自動委譲トリガーを兼ねる（重要な機能差）。Codex 側は spawn_agent 呼び出し時のガイダンステキストとして機能するが、自動委譲には使われない。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.body
    claude:
      field: "（本文 Markdown - system prompt）"
      type: "string"
      scope: agent
    codex:
      field: "developer_instructions"
      type: "string"
      scope: subagent
    direction: both
    loss: lossless
    degrade: null
    transform: "format:json_to_toml"
    warn: false
    notes: "Claude agents/*.md の frontmatter 以降の Markdown 本文が system prompt になる。Codex では standalone TOML の developer_instructions フィールドに相当。内容は lossless だが形式変換（Markdown → TOML 文字列）が必要。Codex→Claude 変換では TOML 文字列を Markdown body に展開する。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.model
    claude:
      field: "model"
      type: "string"
      scope: agent
    codex:
      field: "model"
      type: "string"
      scope: subagent
    direction: both
    loss: lossy
    degrade: null
    transform: "enum_map:{sonnet:（claude-sonnet フル ID）,opus:（claude-opus フル ID）,haiku:（claude-haiku フル ID）,inherit:（省略）}"
    warn: true
    notes: "Claude は sonnet/opus/haiku エイリアスまたはフル model ID（例: claude-opus-4-8）または inherit を受け付ける。Codex standalone TOML の model はフル model ID 直書き（GPT 系 ID）のみ有効でエイリアス非対応。inherit はフィールド省略に相当。モデルプロバイダーが異なるため厳密な等価マッピングはない（lossy）。unmapped エイリアスは warn + 手動確認を促すこと。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.effort
    claude:
      field: "effort"
      type: "enum(low|medium|high|xhigh|max)"
      scope: agent
    codex:
      field: "model_reasoning_effort"
      type: "enum(minimal|low|medium|high|xhigh)"
      scope: subagent
    direction: both
    loss: lossy
    degrade: null
    transform: "enum_map:{max:xhigh,minimal:low}"
    warn: true
    notes: "Claude の effort 値 `max` は Codex に存在しないため xhigh に丸める。Codex の `minimal` は Claude に存在しないため低い方 `low` に丸める。それ以外の low/medium/high/xhigh は lossless。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.tools
    claude:
      field: "tools"
      type: "string|list"
      scope: agent
    codex:
      field: "sandbox_mode"
      type: "enum(read-only|workspace-write|danger-full-access)"
      scope: subagent
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: subagent
      target: ".codex/agents/<name>.toml の sandbox_mode"
    transform: null
    warn: true
    notes: "Codex に個別ツール許可リストの概念がない。tools リストの内容を sandbox_mode で粗く近似: Read 系のみ → read-only、Write 含む → workspace-write、全ツール → 省略（親継承）。Agent(x,y) 構文（spawn 可能エージェントの制限）は Codex に対応機構なし → dropped。MCP ツール名による制限も dropped。warn:true。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.disallowedTools
    claude:
      field: "disallowedTools"
      type: "string|list"
      scope: agent
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex に個別ツール拒否リストの概念がない。変換時は破棄し、相当する sandbox_mode の設定を手動で検討するよう警告すること。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.permissionMode
    claude:
      field: "permissionMode"
      type: "enum(default|acceptEdits|auto|dontAsk|bypassPermissions|plan)"
      scope: agent
    codex:
      field: "sandbox_mode"
      type: "enum(read-only|workspace-write|danger-full-access)"
      scope: subagent
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: subagent
      target: ".codex/agents/<name>.toml の sandbox_mode / approval_policy"
    transform: "enum_map:{default:workspace-write,bypassPermissions:danger-full-access,plan:read-only}"
    warn: true
    notes: "部分対応: default → sandbox_mode:workspace-write + approval_policy:on-request（近似）。bypassPermissions → sandbox_mode:danger-full-access（ただし Codex にも一部の circuit breaker はあるため完全等価ではない）。plan → sandbox_mode:read-only（近似）。acceptEdits/auto/dontAsk は Codex に対応機構なし → dropped。plugin エージェントでは Claude 側でもこのフィールドが無視されることを変換時に注記する。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.maxTurns
    claude:
      field: "maxTurns"
      type: "integer"
      scope: agent
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "ターン数上限は Codex に直接対応がない。Codex の agents.job_max_runtime_seconds（秒ベースのタイムアウト）が最も近いが、粒度が根本的に異なる（ターン数 vs 経過秒数）ため等価変換不可。dropped として処理し、対応する時間制限の手動設定を促すこと。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.skills
    claude:
      field: "skills"
      type: "list"
      scope: agent
    codex:
      field: "skills.config"
      type: "list"
      scope: subagent
    direction: both
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: "Claude の skills フィールドは起動時にスキルのフル内容をコンテキストに inject する（実質的な system prompt 拡張）。Codex の skills.config はスキルの有効化オーバーライド（enabled/path フィールドを持つ object の配列）であり、内容 inject ではない。機能的に大きく異なるため近似にとどまる。warn:true。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.mcpServers
    claude:
      field: "mcpServers"
      type: "list"
      scope: agent
    codex:
      field: "mcp_servers"
      type: "object"
      scope: subagent
    direction: both
    loss: lossy
    degrade: null
    transform: "rename; format:json_to_toml"
    warn: true
    notes: "rename: mcpServers ⇄ mcp_servers。形式変換: JSON（Claude）⇄ TOML（Codex）。Claude の mcpServers は inline 定義（エージェント起動時に接続・終了時に切断）と名前参照（親セッションの接続を共有）の 2 形式を持つが、Codex は TOML の mcp_servers オブジェクトのみ。名前参照形式は standalone TOML では表現困難（lossy）。Claude plugin エージェントでは mcpServers が無視される点を注記すること。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.hooks
    claude:
      field: "hooks"
      type: "object"
      scope: agent
    codex:
      field: "hooks.<Event>"
      type: "object"
      scope: session
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: session
      target: "config.toml の hooks セクション または hooks.json（features.hooks = true 必須）"
    transform: null
    warn: true
    notes: "Claude はエージェント frontmatter 内に hooks を定義し、そのエージェント実行中だけ有効なエージェントスコープを実現できる。Codex では hooks は config.toml または hooks.json に書かれ session/project スコープになる。エージェントスコープに閉じることができないため情報損失。features.hooks = true（Codex 側で明示設定が必要）。Claude の Stop イベントは Codex の SubagentStop に相当するが設定先が変わる。変換後は hooks が全セッションに効くことを警告すること。plugin エージェントでは Claude 側でも hooks が無視される。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.memory
    claude:
      field: "memory"
      type: "enum(user|project|local)"
      scope: agent
    codex:
      field: "features.memories"
      type: "boolean"
      scope: global
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: global
      target: "config.toml の features.memories / memories.generate_memories / memories.use_memories"
    transform: null
    warn: true
    notes: "Claude の memory は user（~/.claude/agent-memory/<name>/）・project（.claude/agent-memory/<name>/）・local（.claude/agent-memory-local/<name>/）の 3 スコープでディレクトリも独立。Codex は features.memories（機能全体の on/off）・memories.generate_memories（新スレッドをメモリ入力として保存）・memories.use_memories（既存メモリをセッションに inject）のグローバル設定のみでスコープ分離の概念がない。変換では lossy として扱い、スコープ意図を変換 notes に残すこと。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.background
    claude:
      field: "background"
      type: "boolean"
      scope: agent
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Claude の background: true は当該エージェントを常時バックグラウンド実行させるフラグ（並列実行・権限プロンプト auto-deny）。Codex に対応フラグがない。warn:true。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.isolation
    claude:
      field: "isolation"
      type: "enum(worktree)"
      scope: agent
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Claude の isolation: worktree はエージェントを一時的な git worktree で分離実行し、デフォルトブランチから分岐したリポジトリコピーを与える（エージェント終了時に変更なければ自動クリーンアップ）。Codex に git worktree isolation の概念がない。warn:true。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.color
    claude:
      field: "color"
      type: "enum(red|blue|green|yellow|purple|orange|pink|cyan)"
      scope: agent
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "UI 装飾フィールド。Codex に受け皿なし。変換時は破棄するのみ。warn:false（機能に影響しない）。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.initialPrompt
    claude:
      field: "initialPrompt"
      type: "string"
      scope: agent
    codex:
      field: "developer_instructions"
      type: "string"
      scope: subagent
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: "Claude の initialPrompt は --agent フラグや agent 設定でメインセッションエージェントとして起動した場合のみ有効。コマンド・スキルも処理され、ユーザー提供プロンプトの前に付加されて自動 submit される。Codex には auto-submit 挙動がない。developer_instructions 末尾への付記で「モデルへの初期指示」として近似するが、auto-submit 挙動・コマンド処理は dropped。warn:true。"
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.nickname_candidates
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "nickname_candidates"
      type: "list"
      scope: subagent
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "Codex 固有フィールド。spawn されたエージェントインスタンスの表示ニックネーム候補プール。Claude に受け皿なし。dropped。warn:false（UI 装飾のみ）。"
    source: "https://github.com/openai/codex"

  - id: subagents.config_file
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "config_file"
      type: "string"
      scope: subagent
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex 固有のロールレイヤー機構。[agents.<name>] から別 TOML ファイルへのパス参照で、role 別の config.toml 互換キーをオーバーレイできる。Claude のエージェント設定はファイル単体で完結するためこの間接参照の概念がない。Codex→Claude 変換では config_file を読み込んで内容をインライン展開した上で Claude frontmatter に変換することが必要。warn:true。"
    source: "https://github.com/openai/codex"

  - id: subagents.spawn-model
    claude:
      field: "（description マッチによる自動委譲）"
      type: "（動作モデル）"
      scope: agent
    codex:
      field: "（spawn_agent ツールの明示呼び出し）"
      type: "（動作モデル）"
      scope: subagent
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Claude Code はエージェントの description のセマンティックマッチにより自動委譲するが、Codex は features.multi_agent=true（既定 on）でも spawn_agent ツールの明示呼び出しが必須（'Codex only spawns a new agent when you explicitly ask it to do so.'）。この根本的な動作モデルの差は変換で再現できない。Claude→Codex 変換時は AGENTS.md または developer_instructions に明示的な spawn 指示を追加することを変換レポートに必ず注記すること。"
    source: "https://developers.openai.com/codex/subagents"

  - id: subagents.plugin-restrictions
    claude:
      field: "（plugin エージェントにおける hooks/mcpServers/permissionMode の無視）"
      type: "（制約）"
      scope: agent
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: "Claude の plugin エージェント（plugin の agents/ ディレクトリに配置）では hooks・mcpServers・permissionMode の 3 フィールドがセキュリティ制約により無視される。plugin として配布されるエージェントを変換する際はこの制約を変換レポートに明記すること。回避策: エージェントファイルを .claude/agents/ または ~/.claude/agents/ にコピーする。"
    source: "https://code.claude.com/docs/en/plugins-reference"

  - id: subagents.global-max_threads
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "agents.max_threads"
      type: "integer"
      scope: global
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "Codex グローバル設定。同時に開けるエージェントスレッドの最大数（デフォルト: 6）。Claude に対応するグローバル制限設定なし。"
    source: "https://github.com/openai/codex"

  - id: subagents.global-max_depth
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "agents.max_depth"
      type: "integer"
      scope: global
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "Codex グローバル設定。spawned agent のネスト深度上限（デフォルト: 1。root は深度 0）。Claude に対応設定なし。なお Claude のサブエージェントはそもそも他サブエージェントを spawn できないため（ネスト深度 1 固定）、この制約は概念的には共通している。"
    source: "https://github.com/openai/codex"

  - id: subagents.global-job_max_runtime_seconds
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "agents.job_max_runtime_seconds"
      type: "integer"
      scope: global
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "Codex グローバル設定。spawn_agents_on_csv バッチ処理のワーカー 1 件あたりのデフォルトタイムアウト（デフォルト: 1800 秒）。Claude に対応設定なし。"
    source: "https://github.com/openai/codex"

notes:
  - "最大の設計差: Claude Code は description のセマンティックマッチで自動委譲するが、Codex は spawn_agent の明示呼び出しが必須。この差は変換で再現できず、変換レポートへの必須注記事項。"
  - "Claude agents/*.md は frontmatter + Markdown body の形式。Codex standalone TOML は name/description/developer_instructions + ConfigToml 互換キーの TOML 形式。形式変換（format:json_to_toml）が必要。"
  - "Claude の plugin エージェントは hooks/mcpServers/permissionMode が無視される。この制約は Codex には存在しない（Codex は subagent に hooks/mcp_servers を持てる）。"
  - "Codex subagent は自動 fork しない（features.multi_agent=true でも spawn_agent 明示が必要）。maxTurns のようなターン制限も直接対応がない（時間ベースの job_max_runtime_seconds のみ）。"
  - "Codex 系統 A（config.toml の [agents.<name>]）と系統 B（standalone TOML）は内部的に統合されており、standalone TOML は自動的にロールとして認識される。変換では系統 B を生成するのが自然。"
  - "Codex のモデル指定はフル model ID（GPT 系）のみ有効。Claude のエイリアス（sonnet/opus/haiku）との対応はプロバイダーが異なり lossy。"
  - "Codex Subagents / Config Reference は 2025-2026 の新機能で仕様が流動的。source URL とともにバージョン依存性を注記すること。"
