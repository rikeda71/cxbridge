domain: subagents
title: "Subagents (agents/*.md / agents/*.toml)"
doc: ../docs/spec.md
files:
  claude:
    - ".claude/agents/<name>.md"
    - "~/.claude/agents/<name>.md"
  codex:
    - ".codex/agents/<name>.toml"
    - "~/.codex/agents/<name>.toml"
    - ".codex/config.toml ([agents.<name>] section)"
format:
  claude: [markdown+yaml-frontmatter]
  codex: [toml]
entries:
  - id: subagents.path
    claude:
      field: "(directory path + .md)"
      type: "path"
      scope: agent
    codex:
      field: "(directory path + .toml)"
      type: "path"
      scope: subagent
    direction: both
    loss: lossless
    degrade: null
    transform: "path:remap; rename"
    warn: false
    notes: "Path remapping of `.claude/agents/<name>.md` ↔ `.codex/agents/<name>.toml` + extension conversion (.md ↔ .toml) + file format conversion (markdown+yaml-frontmatter ↔ toml). Recursive directory traversal is supported by both sides."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.name
    claude:
      field: "name"
      type: "string"
      scope: agent
    codex:
      field: "name"
      type: "string"
      scope: subagent
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "Required field on both sides. Claude recommends kebab-case with the convention of lowercase alphanumeric and hyphens. Codex naming constraints are looser, but ASCII alphanumeric characters, spaces, hyphens, and underscores are safe. Claude's name is also used as the agent_type in hooks."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.description
    claude:
      field: "description"
      type: "string"
      scope: agent
    codex:
      field: "description"
      type: "string"
      scope: subagent
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "Required field on both sides. On the Claude side, the description also serves as the semantic-match trigger for automatic delegation (an important functional difference). On the Codex side it acts as guidance text when spawn_agent is called, but is not used for automatic delegation."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.body
    claude:
      field: "(body Markdown - system prompt)"
      type: "string"
      scope: agent
    codex:
      field: "developer_instructions"
      type: "string"
      scope: subagent
    direction: both
    loss: lossless
    degrade: null
    transform: "format:json_to_toml"
    warn: false
    notes: "The Markdown body after the frontmatter in Claude agents/*.md becomes the system prompt. In Codex this corresponds to the developer_instructions field in standalone TOML. Content is lossless but format conversion (Markdown → TOML string) is required. On Codex→Claude conversion, the TOML string is expanded into a Markdown body."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.model
    claude:
      field: "model"
      type: "string"
      scope: agent
    codex:
      field: "model"
      type: "string"
      scope: subagent
    direction: both
    loss: lossy
    degrade: null
    transform: "enum_map:{sonnet:(claude-sonnet full ID),opus:(claude-opus full ID),haiku:(claude-haiku full ID),inherit:(omit)}"
    warn: true
    notes: "Claude accepts the sonnet/opus/haiku aliases, full model IDs (e.g. claude-opus-4-8), or inherit. Codex standalone TOML's model field only accepts a full model ID (GPT-family IDs) and does not support aliases. `inherit` corresponds to omitting the field. Model providers differ, so there is no strict equivalent mapping (lossy). Unmapped aliases should trigger a warning and prompt manual review."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.effort
    claude:
      field: "effort"
      type: "enum(low|medium|high|xhigh|max)"
      scope: agent
    codex:
      field: "model_reasoning_effort"
      type: "enum(minimal|low|medium|high|xhigh)"
      scope: subagent
    direction: both
    loss: lossy
    degrade: null
    transform: "enum_map:{max:xhigh,minimal:low}"
    warn: true
    notes: "Claude's effort value `max` does not exist in Codex and is rounded down to xhigh. Codex's `minimal` does not exist in Claude and is rounded up to `low`. All other values (low/medium/high/xhigh) are lossless."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.tools
    claude:
      field: "tools"
      type: "string|list"
      scope: agent
    codex:
      field: "sandbox_mode"
      type: "enum(read-only|workspace-write|danger-full-access)"
      scope: subagent
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: subagent
      target: ".codex/agents/<name>.toml sandbox_mode field"
    transform: null
    warn: true
    notes: "Codex has no concept of an individual tool allowlist. The tools list is approximated coarsely with sandbox_mode: read-only-only tools → read-only; includes Write tools → workspace-write; all tools → omit (inherit from parent). The Agent(x,y) syntax for restricting which agents can be spawned has no Codex counterpart → dropped. Restrictions by MCP tool names are also dropped. warn:true."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.disallowedTools
    claude:
      field: "disallowedTools"
      type: "string|list"
      scope: agent
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex has no concept of an individual tool denylist. Discard on conversion and warn the user to consider equivalent sandbox_mode settings manually."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.permissionMode
    claude:
      field: "permissionMode"
      type: "enum(default|acceptEdits|auto|dontAsk|bypassPermissions|plan)"
      scope: agent
    codex:
      field: "sandbox_mode"
      type: "enum(read-only|workspace-write|danger-full-access)"
      scope: subagent
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: subagent
      target: ".codex/agents/<name>.toml sandbox_mode / approval_policy"
    transform: "enum_map:{default:workspace-write,bypassPermissions:danger-full-access,plan:read-only}"
    warn: true
    notes: "Partial mapping: default → sandbox_mode:workspace-write + approval_policy:on-request (approximation). bypassPermissions → sandbox_mode:danger-full-access (not fully equivalent, as Codex still has some circuit breakers). plan → sandbox_mode:read-only (approximation). acceptEdits/auto/dontAsk have no Codex counterpart → dropped. Note in the conversion output that this field is ignored by Claude itself for plugin agents."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.maxTurns
    claude:
      field: "maxTurns"
      type: "integer"
      scope: agent
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "There is no direct Codex counterpart for a turn-count limit. Codex's agents.job_max_runtime_seconds (a seconds-based timeout) is the closest analog, but the granularity is fundamentally different (turn count vs elapsed seconds), so equivalent conversion is not possible. Treat as dropped and prompt the user to configure a corresponding time limit manually."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.skills
    claude:
      field: "skills"
      type: "list"
      scope: agent
    codex:
      field: "skills.config"
      type: "list"
      scope: subagent
    direction: both
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: "Claude's skills field injects the full skill content into the context at startup (effectively a system prompt extension). Codex's skills.config is an activation override for skills (an array of objects with enabled/path fields), not a content injection. The functionality differs significantly, so this is an approximation only. warn:true."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.mcpServers
    claude:
      field: "mcpServers"
      type: "list"
      scope: agent
    codex:
      field: "mcp_servers"
      type: "object"
      scope: subagent
    direction: both
    loss: lossy
    degrade: null
    transform: "rename; format:json_to_toml"
    warn: true
    notes: "rename: mcpServers ↔ mcp_servers. Format conversion: JSON (Claude) ↔ TOML (Codex). Claude's mcpServers supports two forms: inline definition (connects on agent start and disconnects on end) and named reference (shares the parent session's connection). The named-reference form is difficult to express in standalone TOML (lossy). Note in the conversion output that mcpServers is ignored for Claude plugin agents."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.hooks
    claude:
      field: "hooks"
      type: "object"
      scope: agent
    codex:
      field: "hooks.<Event>"
      type: "object"
      scope: session
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: session
      target: "config.toml hooks section or hooks.json (features.hooks = true required)"
    transform: null
    warn: true
    notes: "Claude allows defining hooks inside the agent frontmatter, giving them agent-scoped lifetime (active only while that agent runs). In Codex, hooks are written in config.toml or hooks.json and are session/project scoped. They cannot be limited to agent scope, so information is lost. features.hooks = true must be explicitly set on the Codex side. Claude's Stop event corresponds to Codex's SubagentStop, but the configuration destination changes. Warn after conversion that hooks will apply to all sessions. For Claude plugin agents, hooks are also ignored on the Claude side."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.memory
    claude:
      field: "memory"
      type: "enum(user|project|local)"
      scope: agent
    codex:
      field: "features.memories"
      type: "boolean"
      scope: global
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: global
      target: "config.toml features.memories / memories.generate_memories / memories.use_memories"
    transform: null
    warn: true
    notes: "Claude's memory has three scopes with independent directories: user (~/.claude/agent-memory/<name>/), project (.claude/agent-memory/<name>/), and local (.claude/agent-memory-local/<name>/). Codex provides only global settings: features.memories (master on/off), memories.generate_memories (save new threads as memory input), and memories.use_memories (inject existing memories into the session) — with no concept of scope separation. Treat as lossy on conversion and preserve the scope intent in the conversion notes."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.background
    claude:
      field: "background"
      type: "boolean"
      scope: agent
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Claude's background: true flag keeps the agent running in the background at all times (parallel execution with auto-deny for permission prompts). Codex has no equivalent flag. warn:true."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.isolation
    claude:
      field: "isolation"
      type: "enum(worktree)"
      scope: agent
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Claude's isolation: worktree runs the agent in an isolated temporary git worktree, providing a repository copy branched from the default branch (auto-cleaned up if no changes remain when the agent exits). Codex has no concept of git worktree isolation. warn:true."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.color
    claude:
      field: "color"
      type: "enum(red|blue|green|yellow|purple|orange|pink|cyan)"
      scope: agent
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "UI decoration field. No counterpart in Codex. Dropped during conversion and still listed in the conversion report (warn:false, no functional impact)."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.initialPrompt
    claude:
      field: "initialPrompt"
      type: "string"
      scope: agent
    codex:
      field: "developer_instructions"
      type: "string"
      scope: subagent
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: "Claude's initialPrompt is only effective when the agent is launched as the main-session agent via the --agent flag or agent configuration. Commands and skills are processed, and the prompt is prepended to the user-provided prompt and auto-submitted. Codex has no auto-submit behavior. The approximation is to append it to the end of developer_instructions as an 'initial instruction to the model', but the auto-submit behavior and command processing are dropped. warn:true."
    source: "https://code.claude.com/docs/en/sub-agents"

  - id: subagents.nickname_candidates
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "nickname_candidates"
      type: "list"
      scope: subagent
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "Codex-only field. A pool of display nickname candidates for spawned agent instances. No counterpart in Claude. Dropped. warn:false (UI decoration only)."
    source: "https://github.com/openai/codex"

  - id: subagents.config_file
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "config_file"
      type: "string"
      scope: subagent
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex-only role-layer mechanism. A path reference from [agents.<name>] to a separate TOML file that overlays config.toml-compatible keys for a given role. Claude agent configuration is self-contained in a single file and has no concept of this kind of indirection. On Codex→Claude conversion, config_file must be read and its contents inlined before converting to Claude frontmatter. warn:true."
    source: "https://github.com/openai/codex"

  - id: subagents.spawn-model
    claude:
      field: "(automatic delegation via description match)"
      type: "(behavioral model)"
      scope: agent
    codex:
      field: "(explicit spawn_agent tool call)"
      type: "(behavioral model)"
      scope: subagent
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Claude Code automatically delegates work via semantic matching of the agent's description, whereas Codex requires an explicit call to the spawn_agent tool even when features.multi_agent=true (the default) is set ('Codex only spawns a new agent when you explicitly ask it to do so.'). This fundamental behavioral difference cannot be reproduced by conversion. On Claude→Codex conversion, the conversion report must always note that explicit spawn instructions should be added to AGENTS.md or developer_instructions."
    source: "https://developers.openai.com/codex/subagents"

  - id: subagents.plugin-restrictions
    claude:
      field: "(hooks/mcpServers/permissionMode silently ignored in plugin agents)"
      type: "(constraint)"
      scope: agent
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: "For Claude plugin agents (placed in a plugin's agents/ directory), the three fields hooks, mcpServers, and permissionMode are silently ignored due to security constraints. When converting an agent distributed as a plugin, this restriction must be noted in the conversion report. Workaround: copy the agent file to .claude/agents/ or ~/.claude/agents/."
    source: "https://code.claude.com/docs/en/plugins-reference"

  - id: subagents.global-max_threads
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "agents.max_threads"
      type: "integer"
      scope: global
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "Codex global setting. Maximum number of simultaneously open agent threads (default: 6). Claude has no equivalent global limit setting."
    source: "https://github.com/openai/codex"

  - id: subagents.global-max_depth
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "agents.max_depth"
      type: "integer"
      scope: global
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "Codex global setting. Maximum nesting depth for spawned agents (default: 1; root is depth 0). Claude has no equivalent setting. Note that Claude subagents cannot themselves spawn other subagents (fixed nesting depth of 1), so this constraint is conceptually shared."
    source: "https://github.com/openai/codex"

  - id: subagents.global-job_max_runtime_seconds
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "agents.job_max_runtime_seconds"
      type: "integer"
      scope: global
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "Codex global setting. Default per-worker timeout for spawn_agents_on_csv batch processing (default: 1800 seconds). Claude has no equivalent setting."
    source: "https://github.com/openai/codex"

notes:
  - "The biggest design difference: Claude Code automatically delegates via semantic matching of the description, but Codex requires an explicit spawn_agent call. This difference cannot be reproduced by conversion and is a mandatory item in the conversion report."
  - "Claude agents/*.md uses a frontmatter + Markdown body format. Codex standalone TOML uses a TOML format of name/description/developer_instructions + ConfigToml-compatible keys. Format conversion (format:json_to_toml) is required."
  - "Claude plugin agents have hooks/mcpServers/permissionMode silently ignored. This restriction does not exist in Codex (Codex subagents can have hooks/mcp_servers)."
  - "Codex subagents do not auto-fork (explicit spawn_agent is required even with features.multi_agent=true). Turn-count limits like maxTurns also have no direct counterpart (only the time-based job_max_runtime_seconds)."
  - "Codex lineage A (config.toml [agents.<name>]) and lineage B (standalone TOML) are unified internally; standalone TOML is automatically recognized as a role. Generating lineage B is the natural output of conversion."
  - "Codex model specification only accepts full model IDs (GPT-family). Mapping from Claude aliases (sonnet/opus/haiku) is lossy because the model providers differ."
  - "Codex Subagents / Config Reference is a new feature added in 2025-2026 and the specification is still evolving. Always note version dependencies together with the source URLs."
