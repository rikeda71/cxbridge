domain: memory
title: "Memory / Instruction Files (CLAUDE.md ⇄ AGENTS.md)"
doc: ../docs/spec.md
files:
  claude:
    - "./CLAUDE.md"
    - "./.claude/CLAUDE.md"
    - "~/.claude/CLAUDE.md"
    - "./CLAUDE.local.md"
    - "./.claude/rules/*.md"
    - "/etc/claude-code/CLAUDE.md"          # managed (Linux/WSL)
    - "/Library/Application Support/ClaudeCode/CLAUDE.md"  # managed (macOS)
  codex:
    - "./AGENTS.md"
    - "./AGENTS.override.md"
    - "~/.codex/AGENTS.md"                  # $CODEX_HOME/AGENTS.md
    - "~/.codex/AGENTS.override.md"
format:
  claude: [markdown]
  codex: [markdown]
entries:
  - id: memory.filename
    claude:
      field: "CLAUDE.md (filename)"
      type: "filename"
      scope: project
    codex:
      field: "AGENTS.md (filename)"
      type: "filename"
      scope: project
    direction: both
    loss: lossless
    degrade: null
    transform: "rename"
    warn: false
    notes: "File rename only. Content is copied as-is. AGENTS.md is an open standard from the Linux Foundation ecosystem (Agentic AI Foundation) with support for 18+ tools. Converting CLAUDE.md to AGENTS.md effectively improves portability."
    source: "https://agents.md/"

  - id: memory.project-path
    claude:
      field: "./CLAUDE.md or ./.claude/CLAUDE.md"
      type: "path"
      scope: project
    codex:
      field: "./AGENTS.md (each directory level from git root to CWD)"
      type: "path"
      scope: project
    direction: both
    loss: lossless
    degrade: null
    transform: "path:remap"
    warn: false
    notes: "Path remapping: ./CLAUDE.md → ./AGENTS.md, ./.claude/CLAUDE.md → ./AGENTS.md. Codex searches each directory for AGENTS.override.md then AGENTS.md and adopts the first non-empty file found."
    source: "https://code.claude.com/docs/en/memory"

  - id: memory.user-path
    claude:
      field: "~/.claude/CLAUDE.md"
      type: "path"
      scope: user
    codex:
      field: "~/.codex/AGENTS.md ($CODEX_HOME/AGENTS.md)"
      type: "path"
      scope: global
    direction: both
    loss: lossless
    degrade: null
    transform: "path:remap"
    warn: false
    notes: "User-global instruction file. ~/.claude/CLAUDE.md ⇄ ~/.codex/AGENTS.md (path can be customized via the CODEX_HOME environment variable). At this level Codex also gives priority to AGENTS.override.md."
    source: "https://code.claude.com/docs/en/memory"

  - id: memory.import-syntax
    claude:
      field: "@path/to/file (inline import syntax in file body)"
      type: "syntax"
      scope: project
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: "inline_imports"
    warn: true
    notes: "Codex has no equivalent of @import. During conversion, inline-expand import references into a single file (inline_imports). Expansion rules: supports relative paths, absolute paths, and @~/ (home-directory-relative); @ inside code blocks is excluded; maximum depth is 4 hops (community reports show cases of 5 hops, which may be version-dependent). Always perform a size check after expansion and emit a warning if the 32 KiB limit is at risk."
    source: "https://code.claude.com/docs/en/memory"

  - id: memory.local-file
    claude:
      field: "./CLAUDE.local.md"
      type: "path"
      scope: project
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex has no concept of an uncommitted personal file (AGENTS.override.md is assumed to be committed to the repository). Mark as dropped during conversion and record in the conversion report. Ask the user whether to move the content to ~/.codex/AGENTS.md (global) or discard it."
    source: "https://code.claude.com/docs/en/memory"

  - id: memory.managed-policy
    claude:
      field: "/etc/claude-code/CLAUDE.md (managed policy)"
      type: "path"
      scope: managed
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Organization-enforced CLAUDE.md (macOS: /Library/Application Support/ClaudeCode/CLAUDE.md, Linux: /etc/claude-code/CLAUDE.md, Windows: C:\\Program Files\\ClaudeCode\\CLAUDE.md) has no Codex equivalent. dropped + warn. For organization-wide Codex deployment, distributing ~/.codex/AGENTS.md via MDM/Ansible should be considered separately."
    source: "https://code.claude.com/docs/en/memory"

  - id: memory.override-file
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "AGENTS.override.md (replaces AGENTS.md in the same directory)"
      type: "path"
      scope: project
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "AGENTS.override.md completely replaces AGENTS.md in the same directory. Claude has no equivalent concept. During Codex→Claude conversion, write the override content as CLAUDE.md and warn the user that diff management with the original AGENTS.md will be needed."
    source: "https://github.com/openai/codex/blob/main/codex-rs/core/src/agents_md.rs"

  - id: memory.subdirectory-load
    claude:
      field: "CLAUDE.md in subdirectory (on-demand load for directories deeper than CWD)"
      type: "behavior"
      scope: project
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: "Claude on-demand loads CLAUDE.md files in subdirectories deeper than CWD when files in those directories are read. Codex scans only from git root to CWD and never traverses deeper than CWD. In monorepos with a CLAUDE.md in each subpackage this results in lossy conversion. During conversion, detect CLAUDE.md files deeper than CWD and emit a warning."
    source: "https://github.com/openai/codex/blob/main/codex-rs/core/src/agents_md.rs"

  - id: memory.rules-paths-frontmatter
    claude:
      field: "paths (.claude/rules/*.md YAML frontmatter)"
      type: "yaml-frontmatter"
      scope: project
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Adding a `paths:` frontmatter to .claude/rules/*.md causes that rule to be loaded only when a file matching the specified glob is read (path-conditional loading). Codex has no equivalent mechanism. dropped + warn. During conversion, let the user choose between inlining the rule files into AGENTS.md or splitting them into per-directory AGENTS.md files based on the glob."
    source: "https://code.claude.com/docs/en/memory"

  - id: memory.html-comments
    claude:
      field: "<!-- --> HTML comments (stripped before context injection)"
      type: "syntax"
      scope: project
    codex:
      field: null
      type: null
      scope: null
    direction: both
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: "Claude Code strips HTML block comments <!-- ... --> before context injection (content inside code blocks is preserved). HTML comment handling on the Codex side is officially undefined. Comments may be passed directly to the model. Document this behavioral difference in the conversion report."
    source: "https://code.claude.com/docs/en/memory"

  - id: memory.claudeMdExcludes
    claude:
      field: "claudeMdExcludes (settings.json)"
      type: "string[]"
      scope: project
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Setting for excluding specific CLAUDE.md files by glob pattern. Codex has no mechanism to exclude specific files. dropped + warn. Managed policy files cannot be excluded by claudeMdExcludes either (a Claude-side restriction)."
    source: "https://code.claude.com/docs/en/memory"

  - id: memory.project-doc-max-bytes
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "project_doc_max_bytes (config.toml)"
      type: "usize"
      scope: global
    direction: codex_to_claude
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: "Codex's total size limit for project instruction files (default 32768 bytes = 32 KiB). Claude has no such limit. After converting CLAUDE.md to AGENTS.md (especially after @import expansion), the total may exceed 32 KiB. The conversion tool must check the post-expansion size and emit a warning if it exceeds 28 KiB (to account for a buffer for global instructions). Content beyond the limit is silently truncated by Codex."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/config_toml.rs"

  - id: memory.fallback-filenames
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "project_doc_fallback_filenames (config.toml)"
      type: "string[]"
      scope: global
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "A list of alternative filenames to try when AGENTS.md is not found (e.g. TEAM_GUIDE.md). Claude has no concept of alternative filenames. dropped. During conversion, let the user choose whether to merge the fallback files into CLAUDE.md or ignore them."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/config_toml.rs"

  - id: memory.child-agents-md-feature
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "features.child_agents_md (config.toml [features])"
      type: "boolean"
      scope: global
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "Feature flag that, when enabled, appends additional guidance about AGENTS.md scope and priority to the user instruction message. Claude has no equivalent feature flag. dropped."
    source: "https://github.com/openai/codex/blob/main/docs/agents_md.md"

  - id: memory.merge-order
    claude:
      field: "root→CWD concatenation, last-wins (all files loaded)"
      type: "behavior"
      scope: project
    codex:
      field: "root→CWD concatenation, last-wins (subject to project_doc_max_bytes limit)"
      type: "behavior"
      scope: project
    direction: both
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: "Both sides share the same design of scanning from root toward CWD and concatenating with last-wins semantics (CWD-side instructions take priority). The differences are: Codex's 32 KiB limit (excess is silently truncated, lossy) and that Codex adopts at most one file per directory (AGENTS.override.md takes precedence over AGENTS.md when both are present)."
    source: "https://github.com/openai/codex/blob/main/codex-rs/core/src/agents_md.rs"

  - id: memory.auto-memory
    claude:
      field: "~/.claude/projects/<project>/memory/MEMORY.md (Auto memory)"
      type: "path"
      scope: user
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: |
      Claude's Auto memory (the ~/.claude/projects/.../memory/MEMORY.md file that Claude
      writes autonomously) has no Codex equivalent. dropped. If CLAUDE.md contains references
      to Auto memory, those references will survive conversion, so detect them and emit a
      warning. The /memory command and the autoMemoryEnabled setting are likewise unsupported
      by Codex.
      Structure note (2026): Auto memory now uses a MEMORY.md hub file plus per-topic
      sub-files (e.g. memory/git-preferences.md). The combined load is capped at 200 lines
      or 25 KB — content beyond the limit is silently truncated by Claude. The env var
      CLAUDE_CODE_DISABLE_AUTO_MEMORY=1 disables the entire auto-memory subsystem.
    source: "https://code.claude.com/docs/en/memory"

  - id: memory.claudeMd-setting
    claude:
      field: "claudeMd (managed-settings.json — inline managed CLAUDE.md content)"
      type: "string"
      scope: managed
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: |
      Claude supports a claudeMd string key in managed-settings.json that injects an
      inline managed CLAUDE.md string (set by organization administrators). This is part
      of the Claude Code managed-settings facility (MDM / enterprise deployment). Codex
      has no equivalent inline-content mechanism; the closest workaround is distributing
      a ~/.codex/AGENTS.md via MDM/Ansible. dropped (no automatic conversion possible).
    source: "https://code.claude.com/docs/en/memory"

  - id: memory.auto-memory-directory
    claude:
      field: "autoMemoryDirectory (settings.json — redirect auto-memory storage path)"
      type: "string"
      scope: user
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: |
      The autoMemoryDirectory setting in settings.json redirects where Claude stores its
      auto-generated memory files (default: ~/.claude/projects/<project>/memory/). Codex
      has no auto-memory subsystem at all, so this path redirection has no equivalent.
      dropped + warn. During conversion, note in the report that auto-memory storage
      redirection will not take effect on the Codex side.
    source: "https://code.claude.com/docs/en/memory"

notes:
  - "The file rename (CLAUDE.md ⇄ AGENTS.md) and content transfer are nearly lossless. The main pitfalls are the loss of Claude-specific features (@import, CLAUDE.local.md, managed policy, paths frontmatter) and post-expansion size exceeding Codex's 32 KiB limit."
  - "@import inline expansion (inline_imports) is a mandatory step in claude_to_codex conversion. If the post-expansion size exceeds 28 KiB, emit a warning and advise the user to consider increasing project_doc_max_bytes."
  - "AGENTS.md is an open standard (Agentic AI Foundation / Linux Foundation) with support for 18+ tools. After converting CLAUDE.md → AGENTS.md, Claude-specific syntax (dynamic injection via !`cmd`, references to /memory and similar commands) may malfunction in other agents; scan and warn during conversion."
  - "The maximum @import depth is 4 hops per the official documentation. Community reports show cases of 5 hops (possibly version-dependent). The conversion tool should adopt 4 hops as the safe limit and detect and warn about depth overflows."
  - "Codex-side specifications (project_doc_max_bytes, features.child_agents_md, etc.) are new features added in 2025-2026 and are still evolving. Re-verify with the source URL for each version."
