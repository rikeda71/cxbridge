domain: mcp
title: "MCP Servers (.mcp.json / config.toml)"
doc: ../docs/spec.md
files:
  claude:
    - ".mcp.json"
    - "~/.claude.json"  # local/user scope is stored in mcpServers inside ~/.claude.json
  codex:
    - "~/.codex/config.toml"
    - ".codex/config.toml"
format:
  claude: [json]
  codex: [toml]

entries:
  - id: mcp.format
    claude:
      field: "mcpServers"
      type: "object"
      scope: project
    codex:
      field: "mcp_servers"
      type: "object"
      scope: user
    direction: both
    loss: lossless
    degrade: null
    transform: "format:json_to_toml"
    warn: false
    notes: "Claude stores entries under the `mcpServers` key in a JSON file (.mcp.json / ~/.claude.json). Codex uses the `[mcp_servers.<name>]` section in a TOML file (config.toml). Only the file format changes; value semantics are identical."
    source: "https://code.claude.com/docs/en/mcp"

  - id: mcp.transport_type
    claude:
      field: "type"
      type: "enum(stdio|http|streamable-http|sse|ws)"
      scope: project
    codex:
      field: null
      type: null
      scope: null
    direction: both
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: "Claude specifies the transport via an explicit `type` field. Codex has no `type` field and infers the transport implicitly: stdio if `command` is present, streamable HTTP if `url` is present. Claudeâ†’Codex: drop `type` and rely on the presence of `command`/`url` as a substitute. Codexâ†’Claude: if `command` is present inject `type:\"stdio\"`, if `url` is present inject `type:\"http\"`. `streamable-http` is an alias for `http`."
    source: "https://code.claude.com/docs/en/mcp"

  - id: mcp.transport_sse
    claude:
      field: "type"
      type: "\"sse\""
      scope: project
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex does not support SSE (Server-Sent Events) transport. Claudeâ†’Codex conversion results in dropped + warn. If a `url` field exists, suggest manual migration to HTTP transport (streamable-http). SSE is also deprecated on the Claude side."
    source: "https://code.claude.com/docs/en/mcp"

  - id: mcp.transport_ws
    claude:
      field: "type"
      type: "\"ws\""
      scope: project
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex does not support WebSocket transport. Claudeâ†’Codex conversion results in dropped + warn. If a `url` field exists, suggest manual migration to HTTP transport."
    source: "https://code.claude.com/docs/en/mcp"

  - id: mcp.command
    claude:
      field: "command"
      type: "string"
      scope: project
    codex:
      field: "command"
      type: "string"
      scope: user
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "The launch command for stdio transport. Both sides use the same field name with the value unchanged. The Claude side supports environment variable expansion via `${VAR}` / `${VAR:-default}`. The Codex side also supports environment variable expansion (note: expansion syntax differences may require attention)."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.args
    claude:
      field: "args"
      type: "array<string>"
      scope: project
    codex:
      field: "args"
      type: "array<string>"
      scope: user
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "Command arguments. Both sides use the same field name with the value unchanged. stdio only (Codex returns an error if used with http transport)."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.env
    claude:
      field: "env"
      type: "object<string, string>"
      scope: project
    codex:
      field: "env"
      type: "object<string, string>"
      scope: user
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "Environment variables passed to the server as literal values. Both sides use the same field name with identical semantics. The Claude side supports `${VAR}` expansion. Codex `env` is stdio-only (not usable with http transport). Claude `${VAR}` references are better migrated to Codex `env_vars`, but conversion of literal values is lossless."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.env_vars
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "env_vars"
      type: "array<string|object>"
      scope: user
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex-specific field. An allowlist of host environment variables to forward to the server. Elements are either strings (variable names) or `{name: string, source: \"local\"|\"remote\"}` objects. Claude has no directly equivalent field. Codexâ†’Claude conversion results in dropped + warn (prompt the user to migrate required variables to Claude's `env` as literal values or `${VAR}` expansion)."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.cwd
    claude:
      field: "cwd"
      type: "string"
      scope: project
    codex:
      field: "cwd"
      type: "string (path)"
      scope: user
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "Working directory for the server process. Both sides use the same field name with the value unchanged. For Codex remote stdio (when `environment_id` is not `\"local\"`), an absolute path is required (relative paths cause an error)."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.url
    claude:
      field: "url"
      type: "string"
      scope: project
    codex:
      field: "url"
      type: "string"
      scope: user
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "Endpoint URL for HTTP/SSE/WebSocket transport. Both sides use the same field name with the value unchanged. The Claude side supports `${VAR}` expansion."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.headers
    claude:
      field: "headers"
      type: "object<string, string>"
      scope: project
    codex:
      field: "http_headers"
      type: "object<string, string>"
      scope: user
    direction: both
    loss: lossless
    degrade: null
    transform: "rename"
    warn: false
    notes: "Static headers added to HTTP requests. Only the key name differs (`rename`). Bearer authentication in the form `Authorization: \"Bearer ${VAR}\"` is handled separately in the `mcp.bearer` entry. For `${VAR}` references in headers that should be converted to Codex `env_http_headers`, see the `mcp.env_http_headers` entry."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.bearer
    claude:
      field: "headers.Authorization"
      type: "string (\"Bearer ${VAR}\")"
      scope: project
    codex:
      field: "bearer_token_env_var"
      type: "string (environment variable name)"
      scope: user
    direction: both
    loss: lossy
    degrade: null
    transform: "extract:bearer_env"
    warn: true
    notes: "Bearer authentication token. Claudeâ†’Codex: extract the environment variable name `VAR` from `headers.Authorization: \"Bearer ${VAR}\"` and convert to `bearer_token_env_var = \"VAR\"`. Codexâ†’Claude: expand `bearer_token_env_var = \"VAR\"` into `headers.Authorization: \"Bearer ${VAR}\"`. Authorization values other than `\"Bearer ${VAR}\"` (e.g. `\"Token ${VAR}\"`) are lossy (convert to a static value in `http_headers.Authorization` or require manual intervention)."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.env_http_headers
    claude:
      field: "headers"
      type: "object<string, string> (\"${VAR}\" references)"
      scope: project
    codex:
      field: "env_http_headers"
      type: "object<string, string> (header name â†’ environment variable name)"
      scope: user
    direction: both
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: "Mechanism for dynamically obtaining header values from environment variables. Codex `env_http_headers` is a mapping from header name to environment variable name (e.g. `{\"X-Auth\": \"AUTH_ENV\"}`). Claudeâ†’Codex: `${VAR}` references in `headers` (e.g. `\"X-Auth\": \"${AUTH_ENV}\"`) can be converted to `env_http_headers: {\"X-Auth\": \"AUTH_ENV\"}` (lossy: default values from `${VAR:-default}` are lost). Codexâ†’Claude: expand `env_http_headers` into `${VAR}` form in `headers`."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.timeout
    claude:
      field: "timeout"
      type: "number (ms)"
      scope: project
    codex:
      field: "tool_timeout_sec"
      type: "number (seconds, float)"
      scope: user
    direction: both
    loss: lossless
    degrade: null
    transform: "unit:ms_to_sec"
    warn: false
    notes: "Per-tool-call timeout. Claude uses an integer in milliseconds; Codex uses a floating-point number in seconds. Conversion: `unit:ms_to_sec` (e.g. `60000` â†’ `60.0`) / `unit:sec_to_ms` (e.g. `60.0` â†’ `60000`)."
    source: "https://code.claude.com/docs/en/mcp"

  - id: mcp.startup_timeout
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "startup_timeout_sec"
      type: "number (seconds, float)"
      scope: user
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex-specific field. Timeout for server startup and initial tool-list retrieval (default 10 seconds). `startup_timeout_ms` also exists as an alias. Claude has no per-server equivalent (only the global `MCP_TIMEOUT` environment variable). Codexâ†’Claude conversion results in dropped + warn (suggest manually setting the `MCP_TIMEOUT` environment variable if needed)."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.enabled
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "enabled"
      type: "boolean"
      scope: user
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex-specific field. Setting to `false` disables a server while keeping its configuration (default `true`). Claude has no `enabled` field; the mere presence of an entry means \"enabled\". Codexâ†’Claude conversion: entries with `enabled: false` are excluded from the output `.mcp.json`, and the excluded server names must be listed in the conversion report. `enabled: true` is converted normally (may be omitted)."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.alwaysLoad
    claude:
      field: "alwaysLoad"
      type: "boolean"
      scope: project
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Claude-specific field (since v2.1.121). Disables lazy loading via Tool Search and loads all tools into context at session start. Codex has no Tool Search / lazy-loading mechanism, so there is no equivalent concept. Claudeâ†’Codex conversion results in dropped + warn."
    source: "https://code.claude.com/docs/en/mcp"

  - id: mcp.headersHelper
    claude:
      field: "headersHelper"
      type: "string (shell command)"
      scope: project
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Claude-specific field. Executes a shell command at connection time and uses the JSON object from stdout as dynamic headers. Used for custom authentication such as Kerberos, short-lived tokens, and internal SSO. Codex has no dynamic header generation mechanism. Claudeâ†’Codex conversion results in dropped + warn. For Bearer authentication, suggest conversion to `bearer_token_env_var` (if security requirements permit)."
    source: "https://code.claude.com/docs/en/mcp"

  - id: mcp.oauth.client_id
    claude:
      field: "oauth.clientId"
      type: "string"
      scope: project
    codex:
      field: "oauth.client_id"
      type: "string"
      scope: user
    direction: both
    loss: lossless
    degrade: null
    transform: "rename"
    warn: false
    notes: "OAuth client ID. Only the field name differs (`rename`: `clientId` â†” `client_id`). The value is unchanged."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.oauth.callback_port
    claude:
      field: "oauth.callbackPort"
      type: "number"
      scope: project
    codex:
      field: "mcp_oauth_callback_port"
      type: "number (u16)"
      scope: user
    direction: both
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: "Local port for the OAuth callback. Claude uses a per-server field (`oauth.callbackPort`). Codex uses a top-level field (`mcp_oauth_callback_port`, shared across all MCP servers). When converting a Claude configuration where multiple servers have different `callbackPort` values to Codex, only the last value takes effect (collision is lossy). Include a warning in the conversion report if a collision is detected."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/config_toml.rs"

  - id: mcp.oauth.scopes
    claude:
      field: "oauth.scopes"
      type: "string (space-separated)"
      scope: project
    codex:
      field: "scopes"
      type: "array<string>"
      scope: user
    direction: both
    loss: lossless
    degrade: null
    transform: "str_to_list:space"
    warn: false
    notes: "OAuth scopes. Claude uses a space-separated string per RFC 6749 Â§3.3 (e.g. `\"channels:read chat:write\"`). Codex uses an array of strings (e.g. `[\"channels:read\", \"chat:write\"]`). Converted with `str_to_list:space` / `list_to_str:space`. Value semantics are identical (lossless)."
    source: "https://code.claude.com/docs/en/mcp"

  - id: mcp.oauth.auth_server_metadata_url
    claude:
      field: "oauth.authServerMetadataUrl"
      type: "string (URL)"
      scope: project
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Claude-specific field (since v2.1.64). Overrides the OAuth authorization server metadata URL (bypasses auto-discovery per RFC 9728 / RFC 8414). Codex has no equivalent mechanism. Claudeâ†’Codex conversion results in dropped + warn (warn that the OAuth flow may fail)."
    source: "https://code.claude.com/docs/en/mcp"

  - id: mcp.oauth_resource
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "oauth_resource"
      type: "string (URL)"
      scope: user
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex-specific field. Sends the RFC 8707 OAuth Resource Parameter to the server during the OAuth flow. Claude has no equivalent. Codexâ†’Claude conversion results in dropped + warn."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.enabled_tools
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "enabled_tools"
      type: "array<string>"
      scope: user
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex-specific field. A whitelist of tools exposed by the server (when set, only the listed tools are registered). Claude has no equivalent field. Codexâ†’Claude conversion results in dropped + warn (warn that all tools will be exposed on the Claude side)."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.disabled_tools
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "disabled_tools"
      type: "array<string>"
      scope: user
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex-specific field. A blacklist of tools (excluded after `enabled_tools` is applied). Claude has no equivalent field. Codexâ†’Claude conversion results in dropped + warn."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.default_tools_approval_mode
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "default_tools_approval_mode"
      type: "enum(auto|prompt|approve)"
      scope: user
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex-specific field. Default approval mode for all tools on a server (applied when there is no per-tool override). `auto`: automatically approved, `prompt`: confirm each time, `approve`: explicit approval required. Claude has no equivalent mechanism. Codexâ†’Claude conversion results in dropped + warn."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.tools_approval_mode
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "tools.<name>.approval_mode"
      type: "enum(auto|prompt|approve)"
      scope: user
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex-specific field. Per-tool override of the approval mode. The `approval_mode` field in the `[mcp_servers.<server>.tools.<tool_name>]` section. Claude has no equivalent. Codexâ†’Claude conversion results in dropped + warn."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.required
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "required"
      type: "boolean"
      scope: user
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex-specific field. When `true`, a failure to initialize this server causes `codex exec` to exit with an error. Claude has no equivalent. Codexâ†’Claude conversion results in dropped + warn."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.supports_parallel_tool_calls
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "supports_parallel_tool_calls"
      type: "boolean"
      scope: user
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "Codex-specific field. When `true`, marks all tools on this server as safe for parallel tool calls (default `false`). Claude has no equivalent. Codexâ†’Claude conversion results in dropped (information loss, but the impact on behavior is limited, so warn is false)."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

  - id: mcp.environment_id
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "environment_id"
      type: "string"
      scope: user
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex-specific field (experimental). Specifies the execution environment for the MCP server. `\"local\"` (default) or `\"remote\"` (run stdio in a remote executor). Claude has no equivalent. Codexâ†’Claude conversion results in dropped + warn."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/mcp_types.rs"

notes:
  - "The fundamental difference in transport detection logic (Claude: explicit `type` / Codex: presence of `command`/`url`) requires the bidirectional conversion engine to implement transport detection logic independently."
  - "sse/ws â†’ Codex conversion is always dropped. The conversion engine should attempt automatic conversion to http transport only when an HTTP endpoint exists; otherwise prompt for manual intervention."
  - "In Codexâ†’Claude conversion, entries with `enabled: false` are excluded from the output (Claude has no `enabled` field, and removing the entry is the only way to disable a server). The excluded server names must always be listed in the conversion report."
  - "The scope difference for OAuth `callbackPort` (per-server vs. top-level) poses a real collision risk in projects, and the conversion tool must detect and warn about collisions."
  - "The `RawMcpServerConfig` struct in Codex's `mcp_types.rs` is the single mechanically authoritative source of truth. Because of the `deny_unknown_fields` attribute, unknown fields cause deserialization errors, so the conversion engine must output only the enumerated fields."
  - "The Codex specification is undergoing significant updates in 2025-2026. Deprecated fields such as `bearer_token` (hidden from schema via `schemars(skip)`) exist, so also verify the commit hash of the source URL during implementation."
