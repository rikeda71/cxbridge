domain: skills
title: "Skills (SKILL.md)"
doc: ../docs/spec.md
files:
  claude:
    - ".claude/skills/<name>/SKILL.md"
    - "~/.claude/skills/<name>/SKILL.md"
  codex:
    - ".agents/skills/<name>/SKILL.md"
    - "~/.agents/skills/<name>/SKILL.md"
format:
  claude: [markdown+yaml-frontmatter]
  codex: [markdown+yaml-frontmatter]
entries:
  - id: skills.path
    claude:
      field: "(directory path)"
      type: "path"
      scope: skill
    codex:
      field: "(directory path)"
      type: "path"
      scope: skill
    direction: both
    loss: lossless
    degrade: null
    transform: "path:remap"
    warn: false
    notes: "Path remapping only: `.claude/skills/<name>/` ⇄ `.agents/skills/<name>/`. The filename SKILL.md is shared."
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.name
    claude:
      field: "name"
      type: "string"
      scope: skill
    codex:
      field: "name"
      type: "string"
      scope: skill
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "Required field on both sides. Claude imposes naming constraints: lowercase alphanumeric with hyphens, max 64 characters, \"claude\" and \"anthropic\" are reserved. Codex constraints appear looser, but be mindful of Claude naming constraints when converting to Claude."
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.description
    claude:
      field: "description"
      type: "string"
      scope: skill
    codex:
      field: "description"
      type: "string"
      scope: skill
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "Required field on both sides and serves as the auto-invocation trigger. Semantically a full match. The combined length of description + when_to_use is capped at 1,536 characters (skill-listing truncation in Claude)."
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.when_to_use
    claude:
      field: "when_to_use"
      type: "string"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: "No standalone field in Codex. When converting Claude→Codex, append to the end of `description` and merge. The information as a standalone field is lost."
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.disable-model-invocation
    claude:
      field: "disable-model-invocation"
      type: "boolean"
      scope: skill
    codex:
      field: "policy.allow_implicit_invocation"
      type: "boolean"
      scope: skill
    direction: both
    loss: lossy
    degrade: null
    transform: "polarity:invert"
    warn: true
    notes: "Claude `disable-model-invocation: true` ⇔ Codex `policy.allow_implicit_invocation: false` (inverted). Equivalent: disabling implicit invocation + excluding from model context in description. Non-equivalent: in Claude, setting `disable-model-invocation: true` can cause the model to fail to recognize the skill even on explicit `/skill-name` invocations by the user (known issue: openai/codex-plugin-cc#211). Codex has separate implementations for implicit invocation disable and explicit invocations, so explicit calls work normally. Note this behavioral difference in the conversion report. This field is written in Codex's `agents/openai.yaml`."
    source: "https://github.com/openai/codex"

  - id: skills.user-invocable
    claude:
      field: "user-invocable"
      type: "boolean"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "The concept of \"model-only, hidden from user\" does not exist in Codex. The only fields that carry meaning in the policy section of agents/openai.yaml are allow_implicit_invocation and products. Unknown fields such as user-invocable written there are silently ignored by the runtime skill loader (codex-rs/core-skills/src/loader.rs) with fail-open behavior — they are not rejected. Note that validate_plugin.py's reject_skill_agent_unknown_fields is a lint tool for plugin authoring samples and is separate from the runtime loader. Discard this field on conversion and issue an explicit warning: \"In Codex, users will be able to invoke this skill as $name (it cannot be made model-only)\"."
    source: "https://github.com/openai/codex"

  - id: skills.allowed-tools
    claude:
      field: "allowed-tools"
      type: "string|list"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: session
      target: ".codex/rules/<skill>.rules (execpolicy allow) / mcp_servers.<id>.enabled_tools"
    transform: null
    warn: true
    notes: "Per-tool pre-approval control at skill scope does not exist in Codex (SkillConfig has only three fields: enabled/name/path, with additionalProperties:false confirmed). Writing allowed-tools in the SKILL.md frontmatter is silently ignored by the runtime skill loader with fail-open behavior (no error). Degradation fallback: for Bash command tools, generate prefix_rule(decision=\"allow\") into .codex/rules/<skill>.rules (project, trust_level=\"trusted\" required) or ~/.codex/rules/default.rules (user). For MCP tools, write to mcp_servers.<id>.enabled_tools. Pre-approval of built-in tools (AskUserQuestion etc.) has no alternative → dropped. All cases expand skill scope to session/project scope, so a warning is mandatory. There is also a known bug in [[skills.config]] overrides (openai/codex#14161, fixed 2026-03 (PR #14806))."
    source: "https://github.com/openai/codex"

  - id: skills.disallowed-tools
    claude:
      field: "disallowed-tools"
      type: "string|list"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: session
      target: ".codex/rules/<skill>.rules (execpolicy forbidden) / mcp_servers.<id>.disabled_tools"
    transform: null
    warn: true
    notes: "Writing disallowed-tools in the SKILL.md frontmatter is silently ignored by the runtime skill loader with fail-open behavior (no error). For command tools, generate prefix_rule(decision=\"forbidden\") into .codex/rules/<skill>.rules. For MCP tools, write to mcp_servers.<id>.disabled_tools. Prohibition of built-in tools (AskUserQuestion etc.) has no alternative mechanism → dropped. A warning is mandatory because skill scope expands to session/project."
    source: "https://github.com/openai/codex"

  - id: skills.model
    claude:
      field: "model"
      type: "string"
      scope: skill
    codex:
      field: "model"
      type: "string"
      scope: subagent
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: subagent
      target: ".codex/agents/<skill>.toml model field"
    transform: null
    warn: true
    notes: "Per-skill model selection does not exist in Codex's SKILL.md frontmatter. Writing model in frontmatter is silently ignored by the runtime skill loader with fail-open behavior (no error). Degradation target: generate .codex/agents/<skill>.toml (standalone subagent TOML) and reference it via config_file in config.toml's [agents.<skill>]. However, Codex subagents are not forked automatically — the model must explicitly call spawn_agent. features.multi_agent=true is also required."
    source: "https://developers.openai.com/codex/config-reference"

  - id: skills.effort
    claude:
      field: "effort"
      type: "enum(low|medium|high|xhigh|max)"
      scope: skill
    codex:
      field: "model_reasoning_effort"
      type: "enum(minimal|low|medium|high|xhigh)"
      scope: subagent
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: subagent
      target: ".codex/agents/<skill>.toml model_reasoning_effort field"
    transform: "enum_map:{max:xhigh}"
    warn: true
    notes: "Writing effort in the SKILL.md frontmatter is silently ignored by the runtime skill loader with fail-open behavior (no error). Codex has no `max` effort value, so it is rounded to `xhigh` (the maximum) in the subagent TOML. Degradation to subagent TOML is required, same as model. The constraint that automatic forking does not occur applies equally."
    source: "https://developers.openai.com/codex/config-reference"

  - id: skills.context-fork
    claude:
      field: "context"
      type: "enum(fork)"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: subagent
      target: ".codex/agents/<skill>.toml + config.toml [agents.<skill>] + explicit spawn_agent call"
    transform: null
    warn: true
    notes: "Automatic forking does not exist in Codex (\"Codex only spawns a new agent when you explicitly ask it to do so.\"). Approximate by generating a standalone agent TOML and having the model explicitly call the spawn_agent tool. features.multi_agent=true is required; default max_depth is 1. The agent field degrades to the same target. Note the behavioral change from automatic fork to explicit spawn in the warning report."
    source: "https://developers.openai.com/codex/config-reference"

  - id: skills.agent
    claude:
      field: "agent"
      type: "string"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: subagent
      target: ".codex/agents/<skill>.toml"
    transform: null
    warn: true
    notes: "Claude's `agent` field selects which subagent type to use when `context: fork` is set. Codex has no skill-level subagent-type selection (spawn_agent is always explicit), so this degrades into the subagent TOML at `.codex/agents/<skill>.toml`. The exact agent type is not preserved."
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.hooks
    claude:
      field: "hooks"
      type: "object"
      scope: skill
    codex:
      field: "[[hooks.<Event>]]"
      type: "object"
      scope: session
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: session
      target: "config.toml [[hooks.<Event>]] or hooks.json"
    transform: null
    warn: true
    notes: "Skill-scoped hooks do not exist in Codex. Degrade to session/project-scoped Codex hooks (features.hooks=true is required). Only the command type can be ported; http/mcp_tool/prompt/agent types are dropped. Note in the warning report that the restriction to skill execution only is lost."
    source: "https://developers.openai.com/codex/hooks"

  - id: skills.paths
    claude:
      field: "paths"
      type: "string|list"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "File-operation-event-driven glob auto-invocation has no equivalent mechanism in Codex. The closest approximation is placing AGENTS.md in the directory hierarchy (placing AGENTS.md in the dirname of the glob), but this is not driven by file operation events and is not an equivalent substitute for auto-invocation. dropped + warn."
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.argument-hint
    claude:
      field: "argument-hint"
      type: "string"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Fully supported SKILL.md frontmatter field in Claude (hint shown during autocomplete to indicate expected arguments). Codex Skills have no argument-hint mechanism. Dropped for skill-to-skill conversions."
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.arguments
    claude:
      field: "arguments"
      type: "string|list"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Fully supported SKILL.md frontmatter field in Claude (named positional arguments for $name substitution; space-separated string or YAML list). Codex Skills have no argument mechanism. Dropped in skill→skill conversion. $name references in the body will also remain unresolved on the Codex side, so detect and warn at conversion time."
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.shell
    claude:
      field: "shell"
      type: "enum(bash|powershell)"
      scope: skill
    codex:
      field: "commandWindows"
      type: "string"
      scope: skill
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: "Codex's commandWindows is a Windows-specific command override for hooks, not a shell selection mechanism per se. Approximation via commandWindows is only possible when shell: powershell is specified. bash (the default) requires no special conversion."
    source: "https://developers.openai.com/codex/hooks"

  - id: skills.invocation-syntax
    claude:
      field: "(/skill-name notation in body/README)"
      type: "string"
      scope: skill
    codex:
      field: "($skill-name notation in body/README)"
      type: "string"
      scope: skill
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "The invocation syntax differs — /skill-name (Claude) ⇔ $skill-name (Codex) — so notation in the body and README is also subject to conversion. However, $ also conflicts with shell variables and / also conflicts with path separators, so automatic conversion carries a risk of false positives. It is safer to detect and propose replacements rather than auto-applying."
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.openai-yaml.allow_implicit_invocation
    claude:
      field: "disable-model-invocation"
      type: "boolean"
      scope: skill
    codex:
      field: "policy.allow_implicit_invocation"
      type: "boolean"
      scope: skill
    direction: codex_to_claude
    loss: lossless
    degrade: null
    transform: "polarity:invert"
    warn: false
    notes: "Codex→Claude direction. Converts agents/openai.yaml's policy.allow_implicit_invocation to Claude frontmatter's disable-model-invocation (inverted). This direction is lossless."
    source: "https://github.com/openai/codex"

  - id: skills.openai-yaml.interface
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "interface.display_name / interface.icon_small / interface.icon_large / interface.brand_color"
      type: "string"
      scope: skill
    direction: codex_to_claude
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: "Codex→Claude conversion. Claude has no receptacle for per-skill icon or brand color metadata (there is a similar concept in plugin's displayName, but it is not supported as individual skill-level UI metadata). Issue a warn and prompt manual review."
    source: "https://github.com/openai/codex"

  - id: skills.openai-yaml.default_prompt
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "interface.default_prompt"
      type: "string"
      scope: skill
    direction: codex_to_claude
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: "Codex→Claude conversion. The preamble prompt prepended when $skill-name is invoked. In Claude, it can be approximated by prepending it to the beginning of the body."
    source: "https://github.com/openai/codex"

  - id: skills.openai-yaml.dependencies-tools
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "dependencies.tools"
      type: "list"
      scope: skill
    direction: codex_to_claude
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: "Codex→Claude conversion. Declaration of MCP dependencies. Claude has weak direct support at skill level (similar to plugin's mcpServers). Issue a warn and prompt manual review."
    source: "https://github.com/openai/codex"

  - id: skills.body-dynamic-injection
    claude:
      field: "(!`cmd` dynamic injection / ${CLAUDE_*} variables in body)"
      type: "string"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Claude-specific !`cmd` dynamic injection and body variables ${CLAUDE_SESSION_ID}, ${CLAUDE_SKILL_DIR}, ${CLAUDE_EFFORT} have no Codex equivalent. If left after conversion as literal strings, they risk silent misbehavior. Include in the report: detect via body scanner, warn, and flag for manual review."
    source: "https://code.claude.com/docs/en/skills"

notes:
  - "The SKILL.md filename and structure are shared between both sides. The fundamental challenge in conversion is the asymmetry of frontmatter fields (Claude 16 fields vs. Codex 2 fields)."
  - "Codex→Claude conversion is nearly lossless. Claude→Codex conversion has 14/16 fields requiring attention; notably allowed-tools / model / effort / context:fork / paths / user-invocable cannot be converted equivalently."
  - "When performing \"degradation\" (moving to session/subagent scope) to preserve functionality at the cost of losing skill scope in Claude→Codex conversion, always explicitly list which fields were degraded to which scope in the loss report."
  - "There was a known bug (openai/codex#14161) where [[skills.config]] overrides on the Codex side did not take effect; this was fixed 2026-03 (PR #14806). Per-skill control via [[skills.config]] is now stable."
  - "Codex Skills / Plugins / Hooks are new features added in 2025-2026 with a fluid specification. Re-verify against the source URL for each version at implementation time."
