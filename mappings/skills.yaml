domain: skills
title: "Skills (SKILL.md)"
doc: ../docs/spec.md
files:
  claude:
    - ".claude/skills/<name>/SKILL.md"
    - "~/.claude/skills/<name>/SKILL.md"
  codex:
    - ".agents/skills/<name>/SKILL.md"
    - "~/.agents/skills/<name>/SKILL.md"
format:
  claude: [markdown+yaml-frontmatter]
  codex: [markdown+yaml-frontmatter]
entries:
  - id: skills.path
    claude:
      field: "（ディレクトリパス）"
      type: "path"
      scope: skill
    codex:
      field: "（ディレクトリパス）"
      type: "path"
      scope: skill
    direction: both
    loss: lossless
    degrade: null
    transform: "path:remap"
    warn: false
    notes: "`.claude/skills/<name>/` ⇄ `.agents/skills/<name>/` のパス付け替えのみ。ファイル名 SKILL.md は共通。"
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.name
    claude:
      field: "name"
      type: "string"
      scope: skill
    codex:
      field: "name"
      type: "string"
      scope: skill
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "両者とも必須フィールド。Claude 側は lowercase 英数ハイフン・64 文字以下・\"claude\"/\"anthropic\" 禁止という命名制約あり。Codex 側の制約は緩いと見られるが、Claude 向け変換時は命名制約に注意。"
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.description
    claude:
      field: "description"
      type: "string"
      scope: skill
    codex:
      field: "description"
      type: "string"
      scope: skill
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "両者とも必須フィールドで自動発火トリガー。意味的に完全対応。最大長は Claude ≤1024 文字。"
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.when_to_use
    claude:
      field: "when_to_use"
      type: "string"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: "Codex に独立フィールドなし。Claude→Codex 変換時は `description` 末尾に連結してマージする。独立フィールドとしての情報は失われる。"
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.disable-model-invocation
    claude:
      field: "disable-model-invocation"
      type: "boolean"
      scope: skill
    codex:
      field: "policy.allow_implicit_invocation"
      type: "boolean"
      scope: skill
    direction: both
    loss: lossy
    degrade: null
    transform: "polarity:invert"
    warn: true
    notes: "Claude `disable-model-invocation: true` ⇔ Codex `policy.allow_implicit_invocation: false`（反転）。等価な点: 暗黙発火禁止 + description のモデルコンテキストからの除外。非等価な点: Claude は `disable-model-invocation: true` にするとユーザーの `/skill-name` 明示呼び出し時もモデルが skill を認識できず失敗しうる（既知問題: openai/codex-plugin-cc#211）。Codex は暗黙発火禁止と明示呼び出しを分離実装しており明示呼び出しは正常動作する。この挙動差を変換レポートに注記すること。Codex の `agents/openai.yaml` に書くフィールド。"
    source: "https://github.com/openai/codex"

  - id: skills.user-invocable
    claude:
      field: "user-invocable"
      type: "boolean"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex に「モデル専用・ユーザー非表示」概念が存在しない。agents/openai.yaml の policy セクションで意味を持つフィールドは allow_implicit_invocation と products の 2 つのみ。user-invocable 等の未知フィールドを書いても実行時 skill loader（codex-rs/core-skills/src/loader.rs）は fail open で黙って無視するため設定は効かない（reject ではない）。なお validate_plugin.py の reject_skill_agent_unknown_fields は plugin 作成サンプルの lint ツールであり実行時 loader とは別物。変換時は破棄し「Codex では当該 skill をユーザーが $name で呼べてしまう（モデル専用にできない）」と明示警告する。"
    source: "https://github.com/openai/codex"

  - id: skills.allowed-tools
    claude:
      field: "allowed-tools"
      type: "string|list"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: session
      target: ".codex/rules/<skill>.rules (execpolicy allow) / mcp_servers.<id>.enabled_tools"
    transform: null
    warn: true
    notes: "skill スコープでの per-tool 事前承認制御は Codex に存在しない（SkillConfig は enabled/name/path の 3 フィールドのみ、additionalProperties:false で確定）。allowed-tools を SKILL.md frontmatter に書いても実行時 skill loader は fail open で黙って無視する（エラーにはならない）。降格代替: コマンド系 Bash ツールは prefix_rule(decision=\"allow\") を .codex/rules/<skill>.rules（project, trust_level=\"trusted\" 要）または ~/.codex/rules/default.rules（user）へ生成。MCP ツールは mcp_servers.<id>.enabled_tools へ。組み込みツール（AskUserQuestion 等）の事前承認は代替なし→dropped。全て skill スコープが session/project スコープに拡大するため警告必須。また [[skills.config]] オーバーライド自体に既知バグあり（openai/codex#14161、2026-03 時点オープン）。"
    source: "https://github.com/openai/codex"

  - id: skills.disallowed-tools
    claude:
      field: "disallowed-tools"
      type: "string|list"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: session
      target: ".codex/rules/<skill>.rules (execpolicy forbidden) / mcp_servers.<id>.disabled_tools"
    transform: null
    warn: true
    notes: "disallowed-tools を SKILL.md frontmatter に書いても実行時 skill loader は fail open で黙って無視する（エラーにはならない）。コマンド系は prefix_rule(decision=\"forbidden\") を .codex/rules/<skill>.rules へ生成。MCP ツールは mcp_servers.<id>.disabled_tools へ。組み込みツール（AskUserQuestion 等）の禁止は代替機構なし→dropped。skill スコープが session/project に拡大するため警告必須。"
    source: "https://github.com/openai/codex"

  - id: skills.model
    claude:
      field: "model"
      type: "string"
      scope: skill
    codex:
      field: "model"
      type: "string"
      scope: subagent
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: subagent
      target: ".codex/agents/<skill>.toml の model フィールド"
    transform: null
    warn: true
    notes: "skill 単位の model 指定は Codex の SKILL.md frontmatter に存在しない。model を frontmatter に書いても実行時 skill loader は fail open で黙って無視する（エラーにはならない）。降格先: .codex/agents/<skill>.toml（standalone subagent TOML）を生成し config.toml の [agents.<skill>] に config_file で参照させる。ただし Codex の subagent は自動 fork しないため、モデルが spawn_agent を明示的に呼ぶことに依存する。features.multi_agent=true の設定も必要。"
    source: "https://developers.openai.com/codex/config-reference"

  - id: skills.effort
    claude:
      field: "effort"
      type: "enum(low|medium|high|xhigh|max)"
      scope: skill
    codex:
      field: "model_reasoning_effort"
      type: "enum(low|medium|high|xhigh)"
      scope: subagent
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: subagent
      target: ".codex/agents/<skill>.toml の model_reasoning_effort フィールド"
    transform: "enum_map:{max:xhigh}"
    warn: true
    notes: "effort を SKILL.md frontmatter に書いても実行時 skill loader は fail open で黙って無視する（エラーにはならない）。Codex に effort 値 `max` が存在しないため subagent TOML では `xhigh`（最大値）に丸める。model と同様に subagent TOML への降格が必要。自動 fork しない制約も同様。"
    source: "https://developers.openai.com/codex/config-reference"

  - id: skills.context-fork
    claude:
      field: "context"
      type: "enum(fork)"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: subagent
      target: ".codex/agents/<skill>.toml + config.toml の [agents.<skill>] + spawn_agent 明示呼び出し"
    transform: null
    warn: true
    notes: "自動 fork は Codex に存在しない（「Codex only spawns a new agent when you explicitly ask it to do so.」）。standalone agent TOML を生成し、モデルが spawn_agent ツールを明示的に呼ぶことで近似。features.multi_agent=true 必須、max_depth 既定 1。agent フィールドも同じ降格先。自動 fork から明示 spawn への挙動変化を警告レポートに明記すること。"
    source: "https://developers.openai.com/codex/config-reference"

  - id: skills.hooks
    claude:
      field: "hooks"
      type: "object"
      scope: skill
    codex:
      field: "[[hooks.<Event>]]"
      type: "object"
      scope: session
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: session
      target: "config.toml の [[hooks.<Event>]] または hooks.json"
    transform: null
    warn: true
    notes: "skill スコープの hooks は Codex に存在しない。session/project スコープの Codex hooks（features.hooks=true が必要）へ降格。command タイプのみ移植可、http/mcp_tool/prompt/agent タイプは dropped。skill 実行中だけという限定が失われることを警告レポートに明記すること。"
    source: "https://developers.openai.com/codex/hooks"

  - id: skills.paths
    claude:
      field: "paths"
      type: "string|list"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "ファイル操作イベント駆動の glob 自動発火は Codex に等価機構がない。最も近い近似は AGENTS.md のディレクトリ階層配置（glob の dirname に AGENTS.md を配置）だが、ファイル操作イベント駆動ではなく自動発火の等価代替にはならない。dropped + warn。"
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.argument-hint
    claude:
      field: "argument-hint"
      type: "string"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Skill には引数機構がない（Custom Prompts の deprecated フィールドにのみ存在）。skill 間変換では dropped。本文の $name 置換も Codex 側で展開されない。"
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.arguments
    claude:
      field: "arguments"
      type: "string|list"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex Skill に引数機構なし。Custom Prompts（deprecated）は $1-$9/$ARGUMENTS を持つが、skills への移行が推奨されており過渡的。skill→skill 変換では dropped。本文内の $name 参照も Codex 側で未解決になるため変換時に検出して警告すること。"
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.shell
    claude:
      field: "shell"
      type: "enum(bash|powershell)"
      scope: skill
    codex:
      field: "commandWindows"
      type: "string"
      scope: skill
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: "Codex の commandWindows は hooks の Windows 用コマンド上書きであり、shell 選択そのものではない。shell: powershell の場合のみ commandWindows で近似可能。bash（既定）は特に変換不要。"
    source: "https://developers.openai.com/codex/hooks"

  - id: skills.invocation-syntax
    claude:
      field: "（本文・README 内の /skill-name 記法）"
      type: "string"
      scope: skill
    codex:
      field: "（本文・README 内の $skill-name 記法）"
      type: "string"
      scope: skill
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "呼び出し記法が /skill-name（Claude）⇔ $skill-name（Codex）と異なるため本文・README 中の記法も変換対象。ただし $ は shell 変数とも衝突、/ はパス区切りとも衝突するため自動変換の誤検出リスクあり。検出して置換提案を出す方式が安全。"
    source: "https://code.claude.com/docs/en/skills"

  - id: skills.openai-yaml.allow_implicit_invocation
    claude:
      field: "disable-model-invocation"
      type: "boolean"
      scope: skill
    codex:
      field: "policy.allow_implicit_invocation"
      type: "boolean"
      scope: skill
    direction: codex_to_claude
    loss: lossless
    degrade: null
    transform: "polarity:invert"
    warn: false
    notes: "Codex→Claude 方向。agents/openai.yaml の policy.allow_implicit_invocation を Claude frontmatter の disable-model-invocation（反転）に変換。この方向は lossless。"
    source: "https://github.com/openai/codex"

  - id: skills.openai-yaml.interface
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "interface.display_name / interface.icon_small / interface.icon_large / interface.brand_color"
      type: "string"
      scope: skill
    direction: codex_to_claude
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: "Codex→Claude 変換。Claude の skill レベルにアイコン・ブランドカラーの受け皿がない（plugin の displayName に近い概念はあるが skill 個別の UI メタデータとしては未対応）。warn を出し手動確認を促すこと。"
    source: "https://github.com/openai/codex"

  - id: skills.openai-yaml.default_prompt
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "interface.default_prompt"
      type: "string"
      scope: skill
    direction: codex_to_claude
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: "Codex→Claude 変換。$skill-name 実行時の前置プロンプト。Claude では本文先頭への追記で近似可能。"
    source: "https://github.com/openai/codex"

  - id: skills.openai-yaml.dependencies-tools
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "dependencies.tools"
      type: "list"
      scope: skill
    direction: codex_to_claude
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: "Codex→Claude 変換。MCP 依存の宣言。Claude の skill レベルの直接受け皿は弱い（plugin の mcpServers に近い）。warn を出し手動確認を促すこと。"
    source: "https://github.com/openai/codex"

  - id: skills.body-dynamic-injection
    claude:
      field: "（本文内の !`cmd` 動的注入 / ${CLAUDE_*} 変数）"
      type: "string"
      scope: skill
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Claude 固有の !`cmd` 動的注入と ${CLAUDE_SESSION_ID} 等の変数は Codex 側での同等機構が未確認。変換後にリテラル文字列として残ると誤動作の恐れがある。本文スキャナで検出し警告・要手動確認の旨をレポートに含めること。"
    source: "https://code.claude.com/docs/en/skills"

notes:
  - "SKILL.md のファイル名・構造は両者で共通。変換の本質的な難所は frontmatter フィールドの非対称性（Claude 16 フィールド vs Codex 2 フィールド）にある。"
  - "Codex→Claude 変換はほぼ無損失。Claude→Codex 変換は 14/16 フィールドが要注意で、特に allowed-tools / model / effort / context:fork / paths / user-invocable は等価変換不可。"
  - "Claude→Codex で skill スコープを失う代わりに機能を保つ「降格」（session/subagent スコープへの移動）を行う場合、どのフィールドをどのスコープへ降格したかを必ず損失レポートに明記すること。"
  - "Codex の [[skills.config]] オーバーライドに両方向とも効かない既知バグ（openai/codex#14161、2026-03 時点オープン）があり、skill 単位制御は実装上も不安定。"
  - "Codex Skills / Plugins / Hooks は 2025-2026 年追加の新機能で仕様が流動的。実装時は source URL のバージョンごとに再検証すること。"
