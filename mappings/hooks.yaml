      scope: session
    direction: both
    loss: lossy
    transform: null
    warn: true
    notes: >
      Claude の "*" や "" は全マッチ。Codex では "*" は regex として
      解釈され期待通りに動かない。Claude→Codex: "*" → "" または省略に変換。lossy。
    source: "https://code.claude.com/docs/en/hooks"

