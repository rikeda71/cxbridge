    notes: "The only common hook type executable by both sides."
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/hook_config.rs"

  - id: hooks.type.http
    claude:
      field: "hooks.*.hooks[].type"
      type: "\"http\""
      scope: session
