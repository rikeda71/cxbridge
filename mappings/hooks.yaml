      Special flag for background execution that restarts Claude on exit code 2.
      Not supported by Codex. dropped. Codex's async: true does not restart.
    source: "https://code.claude.com/docs/en/hooks"

  # ── Matcher ─────────────────────────────────────────────────────────
  - id: hooks.matcher.regex
    claude:
      field: "hooks.*.matcher"
      type: "string (regex)"
      scope: session
    codex:
      field: "hooks.*.matcher"
      type: "string (regex)"
      scope: session
    direction: both
    loss: lossless
    transform: null
    warn: false
    notes: >
      Claude's regex format (evaluated as regex when it contains characters other than
      alphanumerics, _, or |) can be used in Codex as-is. lossless.
    source: "https://code.claude.com/docs/en/hooks"

  - id: hooks.matcher.exact
    claude:
      field: "hooks.*.matcher"
      type: "string (exact/list)"
      scope: session
    codex:
      field: "hooks.*.matcher"
      type: "string (regex)"
      scope: session
    direction: both
    loss: lossy
    transform: null
    warn: true
    notes: >
      Claude evaluates a matcher containing only alphanumerics, _, or | as exact/list,
      but Codex always evaluates it as a regex.
      Claude→Codex: "Bash" → "^Bash$", "Edit|Write" → "^(Edit|Write)$" conversion required.
      lossy (without conversion, matches in Codex may be broader than intended).
    source: "https://code.claude.com/docs/en/hooks"

  - id: hooks.matcher.wildcard
    claude:
      field: "hooks.*.matcher"
      type: "string (\"*\" or \"\")"
      scope: session
    codex:
      field: "hooks.*.matcher"
      type: "string (\"\" or omit)"
      scope: session
    direction: both
    loss: lossy
    transform: null
    warn: true
    notes: >
      Claude's "*" or "" matches everything. In Codex, "*" is interpreted as a regex
      and does not behave as expected. Claude→Codex: convert "*" to "" or omit. lossy.
    source: "https://code.claude.com/docs/en/hooks"

