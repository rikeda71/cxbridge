domain: hooks
title: "Hooks"
doc: ../docs/spec.md
files:
  claude:
    - "~/.claude/settings.json"
    - ".claude/settings.json"
    - ".claude/settings.local.json"
    - ".claude/hooks/hooks.json"
  codex:
    - "~/.codex/hooks.json"
    - ".codex/hooks.json"
    - "~/.codex/config.toml"
    - ".codex/config.toml"
format:
  claude: [json]
  codex: [toml, json]

entries:

  # ── 設定フォーマット ───────────────────────────────────────────────
  - id: hooks.config_format
    claude:
      field: "hooks"
      type: "object"
      scope: session
    codex:
      field: "hooks"
      type: "object"
      scope: session
    direction: both
    loss: lossless
    transform: "format:json_to_toml"
    warn: false
    notes: >
      Claude は JSON ("hooks":{EventName:[{matcher,hooks:[...]}]})、
      Codex は TOML ([[hooks.EventName]] array-of-tables) または JSON hooks.json。
      JSON→JSON はそのまま、JSON→TOML は format:json_to_toml で変換。
    source: "https://code.claude.com/docs/en/hooks"

  - id: hooks.features_opt_in
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "features.hooks"
      type: "boolean"
      scope: session
    direction: codex_to_claude
    loss: lossy
    transform: null
    warn: true
    notes: >
      Claude は常時有効（設定不要）。Codex は hooks デフォルト有効であり、
      [features] hooks = false を設定した場合にのみ無効化される。
      省略時は有効。features.codex_hooks は deprecated alias。
      Claude→Codex 変換時は config.toml への追記は不要（デフォルト有効のため）。
      明示的に有効化したい場合のみ hooks = true を記述する。
    source: "https://developers.openai.com/codex/config-reference"

