    transform: null
    warn: true
    notes: >
      Codex parses it at the schema level but the execution engine is not implemented.
      Even if it remains in the config after claude_to_codex conversion, Codex silently
      ignores it. Treat as effectively dropped and warn. agent hook is experimental (Claude side).
    source: "https://github.com/openai/codex/blob/main/codex-rs/config/src/hook_config.rs"

