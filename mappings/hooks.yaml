notes:
  - >
    Codex の features.codex_hooks と features.hooks の関係: features.hooks はデフォルト有効。
    features.codex_hooks は deprecated alias（PR #18893 で確認）。
    新規設定では features.hooks を使うこと。無効化する場合は features.hooks = false を記述。
  - >
    Codex の Windows サポート: commandWindows / command_windows フィールドは存在するが、
    Codex CLI 自体の Windows サポート状況は 2026-05 時点で未確認（公式ドキュメントに
    明示なし）。
  - >
    Codex の prompt/agent hook タイプは hook_config.rs のスキーマに含まれるが、
    実行エンジン（codex-rs/hooks）では command のみが実装されている。
    変換後にサイレント無視されるため、dropped として扱い警告を出すこと。
  - >
    Stop hook の無限ループ防止: 両者とも stop_hook_active フィールドを入力 JSON に含める。
    Claude はデフォルト 8 回ブロックで上書き（CLAUDE_CODE_STOP_HOOK_BLOCK_CAP で変更可）。
  - >
    PreToolUse の updatedInput が複数 hook から返された場合の動作:
    Claude は並列実行の最後に終わったものが優先（非決定的）。Codex の挙動は未確認。
  - >
    [重要・落とし穴] Plugin 同梱 hooks がロードされない Codex バグ (Issue #16430, 2026-04 報告, open):
    Codex の plugin マニフェストパーサーは skills と mcp_servers をパースするが hooks キーをパースしない。
    hook discovery はユーザー設定フォルダ（~/.codex/hooks.json 等）のみをスキャンし、
    インストール済み plugin root の hooks.json はスキャンされない。
    Claude plugin（または Codex plugin）を Codex にインストールしても、その同梱 hooks は
    現状ロードされない可能性が高い。hooks 定義内容を手動でユーザー設定にコピーする必要がある。
    ref: https://github.com/openai/codex/issues/16430
  - >
    Codex イベントパリティは進行中 (Issue #21753, umbrella tracker):
    Codex は Claude の 29+ イベント全対応を目標に開発中。
    共通 10 イベント（SessionStart/UserPromptSubmit/PreToolUse/PermissionRequest/PostToolUse/
    SubagentStart/SubagentStop/PreCompact/PostCompact/Stop）の判定は現状維持だが、
    今後 Codex 側追加により対応状況が変わる可能性がある。
    ref: https://github.com/openai/codex/issues/21753
  - >
    Codex は hook 実行時に CLAUDE_PLUGIN_ROOT と CLAUDE_PLUGIN_DATA を後方互換目的で設定する。
    それ以外の Claude 環境変数（CLAUDE_PROJECT_DIR, CLAUDE_ENV_FILE, CLAUDE_EFFORT 等）は
    Codex では設定されない。
