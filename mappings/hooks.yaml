      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    transform: null
    warn: true
    notes: "Codex has no HTTP hook type. dropped. Alternative: command + curl script."
    source: "https://code.claude.com/docs/en/hooks"

  - id: hooks.type.mcp_tool
