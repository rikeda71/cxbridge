domain: hooks
title: "Hooks"
doc: ../docs/spec.md
files:
  claude:
    - "~/.claude/settings.json"
    - ".claude/settings.json"
    - ".claude/settings.local.json"
    - ".claude/hooks/hooks.json"
  codex:
    - "~/.codex/hooks.json"
    - ".codex/hooks.json"
    - "~/.codex/config.toml"
    - ".codex/config.toml"
format:
  claude: [json]
  codex: [toml, json]

entries:

  # ── Configuration format ───────────────────────────────────────────────
  - id: hooks.config_format
    claude:
      field: "hooks"
      type: "object"
      scope: session
    codex:
      field: "hooks"
      type: "object"
      scope: session
    direction: both
    loss: lossless
    transform: "format:json_to_toml"
    warn: false
    notes: >
      Claude uses JSON ("hooks":{EventName:[{matcher,hooks:[...]}]}),
      Codex uses TOML ([[hooks.EventName]] array-of-tables) or JSON hooks.json.
      JSON→JSON passes through as-is; JSON→TOML is converted via format:json_to_toml.
    source: "https://code.claude.com/docs/en/hooks"

  - id: hooks.features_opt_in
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "features.hooks"
      type: "boolean"
      scope: session
    direction: codex_to_claude
    loss: lossy
    transform: null
    warn: true
    notes: >
      Claude is always enabled (no configuration needed). Codex has hooks enabled by
      default; they are disabled only when [features] hooks = false is set.
      When omitted, hooks are enabled. features.codex_hooks is a deprecated alias.
      When converting Claude→Codex, no addition to config.toml is needed (enabled by
      default). Write hooks = true only when you want to explicitly enable it.
    source: "https://developers.openai.com/codex/config-reference"

