      Claude の regex 形式（英数字・_・| 以外を含む場合に regex 評価）は
      Codex でそのまま使用可。lossless。
    source: "https://code.claude.com/docs/en/hooks"

  - id: hooks.matcher.exact
    claude:
      field: "hooks.*.matcher"
      type: "string (exact/list)"
      scope: session
    codex:
      field: "hooks.*.matcher"
      type: "string (regex)"
      scope: session
    direction: both
    loss: lossy
    transform: null
    warn: true
    notes: >
      Claude の英数字・_・| のみの matcher は exact/list 評価だが、
      Codex は常に regex として評価する。
      Claude→Codex: "Bash" → "^Bash$"、"Edit|Write" → "^(Edit|Write)$" に変換が必要。
      lossy（変換しないと Codex でのマッチが広くなる可能性）。
    source: "https://code.claude.com/docs/en/hooks"

  - id: hooks.matcher.wildcard
