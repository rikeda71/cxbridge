notes:
  - >
    Relationship between Codex features.codex_hooks and features.hooks: features.hooks is
    enabled by default. features.codex_hooks is a deprecated alias (confirmed in PR #18893).
    Use features.hooks in new configurations. To disable, write features.hooks = false.
  - >
    Codex Windows support: the commandWindows / command_windows fields exist, but
    the Windows support status of the Codex CLI itself is unconfirmed as of 2026-05
    (not explicitly stated in official documentation).
  - >
    Codex's prompt/agent hook types are included in the hook_config.rs schema, but
    only command is implemented in the execution engine (codex-rs/hooks).
    Because they are silently ignored after conversion, treat them as dropped and emit a warning.
  - >
    Stop hook infinite-loop prevention: both sides include the stop_hook_active field in
    the input JSON. Claude blocks and overrides by default after 8 times
    (configurable via CLAUDE_CODE_STOP_HOOK_BLOCK_CAP).
  - >
    Behavior when multiple hooks return updatedInput from PreToolUse:
    Claude gives priority to the last one to finish in parallel execution (non-deterministic).
    Codex behavior is unconfirmed.
  - >
    [Plugin-bundled hooks — Issue #16430, effectively fixed in source]:
    The original #16430 bug (plugin manifest parser not loading the hooks key) was fixed in
    openai/codex PR #22552 (merged 2026-05-21): hook discovery now calls
    append_plugin_hook_sources() in discovery.rs and auto-detects hooks/hooks.json inside each
    installed plugin root. The PluginHooks feature flag was removed. Issue #16430 is technically
    still listed as open in the tracker, but the code change is shipped.
    Plugin-bundled hooks ARE now discovered and loaded by Codex, subject to the hook trust prompt.
    The --hooks-target=user|project flag therefore no longer has to be used merely to make plugin
    hooks work; it is still available as an optional write-destination preference.
    ref: https://github.com/openai/codex/issues/16430 (see also PR #22552)
  - >
    Codex event parity (Issue #21753, umbrella tracker, still open):
    The tracker lists SubagentStart and SubagentStop as "Missing", but both events ARE
    implemented in the current Codex source (HookEventName enum in codex-rs/hooks/src/engine/).
    The issue matrix reflects the state at the time the tracker was filed and has not been
    updated to match the source. Treat the source as the authoritative truth: SubagentStart
    and SubagentStop are treated as common events (both/lossless) in this mapping.
    The determination of 10 common events (SessionStart/UserPromptSubmit/PreToolUse/
    PermissionRequest/PostToolUse/SubagentStart/SubagentStop/PreCompact/PostCompact/Stop)
    is maintained; coverage may increase as Codex adds more events.
    ref: https://github.com/openai/codex/issues/21753
  - >
    Plugin-hook environment variables: when executing a hook that originates from a plugin,
    Codex sets PLUGIN_ROOT and PLUGIN_DATA (canonical names) as well as
    CLAUDE_PLUGIN_ROOT and CLAUDE_PLUGIN_DATA (compatibility aliases for scripts written
    against the Claude plugin environment). All other Claude environment variables
    (CLAUDE_PROJECT_DIR, CLAUDE_ENV_FILE, CLAUDE_EFFORT, etc.) are not set by Codex.
