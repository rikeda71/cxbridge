  - id: plugins.marketplace.metadata.pluginRoot
    claude:
      field: "metadata.pluginRoot"
      type: "string"
      scope: marketplace
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: >
      Codex に `metadata.pluginRoot` 相当フィールドはない。
      各プラグインエントリの `source.path` を展開した形に正規化することで
      情報を吸収できる。lossy（メタ情報が失われる）。
    source: "https://www.schemastore.org/claude-code-marketplace.json"

notes:
  - >
    Claude と Codex は plugin.json の基本メタデータ（name/version/description/author 等）は
    ほぼ lossless で相互変換できる。最大の差分は「Claude 固有の統合機能群
    (lspServers/outputStyles/themes/monitors/userConfig/channels/settings/dependencies)」と
    「Codex 固有の UI/ブランド情報群 (interface.brandColor/logo/capabilities/screenshots 等)」の
    いずれも相手側に受け皿がなく完全に dropped になる点。
  - >
    マーケットプレイスの source スキーマは Claude と Codex で名称・構造が微妙に異なる
    （Claude `relative` 相対パス → Codex `{source:"local",...}` など）。
    変換エンジンは source タイプ名の正規化と sha/commit フィールド名の統一を行うこと。
  - >
    `openai/codex-plugin-cc` は Claude Code 専用プラグイン（`.claude-plugin/plugin.json` を持つ）。
    Claude Code セッションから Codex CLI をサブプロセス起動する一方向ブリッジ
    （`/codex:review` 等のコマンド + Stop hook によるレビューゲート）。
    ハイブリッド対応プラグインの実例ではなく、Codex plugin marketplace からインストールするものでもない。
    両対応プラグインはデュアルマニフェスト戦略（`.claude-plugin/plugin.json` + `.codex-plugin/plugin.json`）が必要。
  - >
    Codex plugin.json は `version` が strict semver で必須。
    Claude→Codex 変換で `version` が省略されている場合は
    `"0.0.0"` を補完するか git SHA からの変換が必要（warn 必須）。
  - >
    Codex の `policy` フィールドはマーケットプレイスエントリに必須。
    Claude→Codex 変換では policy を自動補完（既定値: installation=AVAILABLE, authentication=ON_INSTALL）
    することを推奨。変換レポートに自動補完した旨を明記すること。
  - >
    Codex Plugins は 2025-2026 年追加の新機能で仕様が流動的。
    `source` URL とともにバージョン依存性を確認すること。
