domain: plugins
title: "Plugins (plugin.json / marketplace.json)"
doc: ../docs/spec.md
files:
  claude:
    - ".claude-plugin/plugin.json"
    - ".claude-plugin/marketplace.json"
  codex:
    - ".codex-plugin/plugin.json"
    - ".agents/plugins/marketplace.json"
    - ".claude-plugin/marketplace.json"  # Path on the Claude side that Codex reads for compatibility
format:
  claude: [json]
  codex: [json]
entries:
  # ─── Manifest placement ────────────────────────────────────────────────────
  - id: plugins.manifest-path
    claude:
      field: ".claude-plugin/plugin.json"
      type: "path"
      scope: plugin
    codex:
      field: ".codex-plugin/plugin.json"
      type: "path"
      scope: plugin
    direction: both
    loss: lossless
    degrade: null
    transform: "path:remap"
    warn: false
    notes: >
      Manifest directories are `.claude-plugin/` ↔ `.codex-plugin/`.
      The filename `plugin.json` is shared between both.
      Plugins that support both sides need a dual-manifest strategy: a separate
      `.claude-plugin/plugin.json` (for Claude) and `.codex-plugin/plugin.json` (for Codex).
      `openai/codex-plugin-cc` is a Claude Code-only plugin (with only `.claude-plugin/plugin.json`)
      and is not an example of a hybrid dual-manifest plugin.
      Codex reads `.claude-plugin/marketplace.json` as a "legacy-compatible marketplace" for
      catalog discovery, but this is not compatibility loading of the manifest (`plugin.json`) itself.
    source: "https://code.claude.com/docs/en/plugins-reference"

  # ─── plugin.json required fields ───────────────────────────────────────────
  - id: plugins.name
    claude:
      field: "name"
      type: "string"
      scope: plugin
    codex:
      field: "name"
      type: "string"
      scope: plugin
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: >
      Required by both sides. Claude recommends kebab-case (used as the component namespace).
      Codex requires kebab-case of ≤64 characters.
    source: "https://www.schemastore.org/claude-code-plugin-manifest.json"

  - id: plugins.version
    claude:
      field: "version"
      type: "string"
      scope: plugin
    codex:
      field: "version"
      type: "string"
      scope: plugin
    direction: both
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: >
      Claude: optional (defaults to git SHA if omitted). Codex: strict semver required.
      When converting Claude→Codex and `version` is absent, semver completion is needed
      (e.g. supply `"0.0.0"` or derive from git SHA). Must be noted in the conversion report.
    source: "https://developers.openai.com/codex/plugins/build"

  - id: plugins.description
    claude:
      field: "description"
      type: "string"
      scope: plugin
    codex:
      field: "description"
      type: "string"
      scope: plugin
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: >
      Claude: optional. Codex: required. The content can be copied verbatim (lossless).
      When converting Claude→Codex and the field is absent, supply an empty string or derive from `name`.
    source: "https://www.schemastore.org/claude-code-plugin-manifest.json"

  # ─── plugin.json common metadata ───────────────────────────────────────────
  - id: plugins.author
    claude:
      field: "author"
      type: "object{name,email?,url?}"
      scope: plugin
    codex:
      field: "author"
      type: "object{name,email?,url?}"
      scope: plugin
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "Both sides share the same schema (name required, email/url optional). Lossless."
    source: "https://www.schemastore.org/claude-code-plugin-manifest.json"

  - id: plugins.homepage
    claude:
      field: "homepage"
      type: "string (URI)"
      scope: plugin
    codex:
      field: "homepage"
      type: "string"
      scope: plugin
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: null
    source: "https://www.schemastore.org/claude-code-plugin-manifest.json"

  - id: plugins.repository
    claude:
      field: "repository"
      type: "string"
      scope: plugin
    codex:
      field: "repository"
      type: "string"
      scope: plugin
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: null
    source: null

  - id: plugins.license
    claude:
      field: "license"
      type: "string"
      scope: plugin
    codex:
      field: "license"
      type: "string"
      scope: plugin
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "SPDX identifier. Lossless."
    source: null

  - id: plugins.keywords
    claude:
      field: "keywords"
      type: "array[string]"
      scope: plugin
    codex:
      field: "keywords"
      type: "array[string]"
      scope: plugin
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: null
    source: null

  # ─── displayName (rename transform) ────────────────────────────────────────
  - id: plugins.display-name
    claude:
      field: "displayName"
      type: "string"
      scope: plugin
    codex:
      field: "interface.displayName"
      type: "string"
      scope: plugin
    direction: both
    loss: lossless
    degrade: null
    transform: "rename"
    warn: false
    notes: >
      Claude `displayName` ↔ Codex `interface.displayName`.
      Key rename only. Requires Claude v2.1.143+.
    source: "https://code.claude.com/docs/en/plugins-reference"

  - id: plugins.short-description
    claude:
      field: "description"
      type: "string"
      scope: plugin
    codex:
      field: "interface.shortDescription"
      type: "string"
      scope: plugin
    direction: both
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: >
      Claude's `description` and Codex's `interface.shortDescription` are semantically close.
      Claude→Codex: also copy `description` into `interface.shortDescription` (duplication is acceptable).
      Codex→Claude: if `interface.shortDescription` is present, repurpose it as `description` for an approximation.
      Not a strict 1:1 mapping, hence lossy.
    source: "https://github.com/openai/plugins"

  # ─── Component paths ────────────────────────────────────────────────────────
  - id: plugins.skills
    claude:
      field: "skills"
      type: "string|array"
      scope: plugin
    codex:
      field: "skills"
      type: "string"
      scope: plugin
    direction: both
    loss: lossy
    degrade: null
    transform: "path:remap"
    warn: true
    notes: >
      All array paths are discovered and their child skills converted, but the Codex manifest
      `skills` field holds only a single path, so a multi-path array cannot be fully represented
      in the manifest (a warning is emitted).
    source: "https://code.claude.com/docs/en/plugins-reference"

  - id: plugins.mcpServers
    claude:
      field: "mcpServers"
      type: "string|array|object"
      scope: plugin
    codex:
      field: "mcpServers"
      type: "string"
      scope: plugin
    direction: both
    loss: lossy
    degrade: null
    transform: "path:remap"
    warn: true
    notes: >
      Claude allows three forms: inline object, multiple paths, or a single path.
      Codex accepts only a single path to a `.mcp.json` file.
      When the value is an inline object, it must be written out as `.mcp.json` and replaced
      with a reference path.
      The MCP server configuration content (command/args/env) has the same shape on both sides
      and is lossless.
    source: "https://developers.openai.com/codex/plugins/build"

  - id: plugins.hooks
    claude:
      field: "hooks"
      type: "string|array|object"
      scope: plugin
    codex:
      field: "hooks"
      type: "string|array"
      scope: plugin
    direction: both
    loss: lossy
    degrade: null
    transform: "path:remap"
    warn: true
    notes: >
      Path remapping for hook configuration files.
      Event name and hook-type mapping follows the same conversion rules as the skills domain.
      Claude also allows an inline object form, which may need to be written out to a file
      before referencing from Codex.
    source: "https://code.claude.com/docs/en/plugins-reference"

  - id: plugins.commands
    claude:
      field: "commands"
      type: "string|array"
      scope: plugin
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: >
      Claude's flat `.md` command files (`commands/`) have no equivalent concept in Codex.
      Porting to a `skills/` directory (with added SKILL.md wrappers) is the closest
      approximation, but directory-structure conversion is required.
      Must be noted in the conversion report.
    source: "https://code.claude.com/docs/en/plugins-reference"

  - id: plugins.agents
    claude:
      field: "agents"
      type: "string|array"
      scope: plugin
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: >
      Codex also has an agents directory, but its frontmatter schema is converted according
      to the correspondence table defined in the skills domain. At the plugin manifest level,
      a direct counterpart key for the `agents` path field has not been confirmed in Codex
      (needs verification).
    source: "https://code.claude.com/docs/en/plugins-reference"

  - id: plugins.apps
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "apps"
      type: "string"
      scope: plugin
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: >
      Codex's `apps` field is a path to a `.app.json` connector configuration.
      `.app.json` declares IDs for OAuth connectors (connector_*) or Agent SDK apps (asdk_app_*).
      Conceptually close to Claude's `channels`, but the schemas differ fundamentally and direct
      conversion is not possible.
      Codex→Claude conversion: dropped + warn.
    source: "https://github.com/openai/plugins"

  # ─── Claude-only fields (no Codex equivalent → dropped) ────────────────────
  - id: plugins.lspServers
    claude:
      field: "lspServers"
      type: "string|array|object"
      scope: plugin
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: >
      Codex has no LSP (Language Server Protocol) support.
      Completely dropped on Claude→Codex conversion. Must be listed in the conversion report.
    source: "https://code.claude.com/docs/en/plugins-reference"

  - id: plugins.outputStyles
    claude:
      field: "outputStyles"
      type: "string|array"
      scope: plugin
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex has no output-style feature. Dropped."
    source: "https://code.claude.com/docs/en/plugins-reference"

  - id: plugins.experimental.themes
    claude:
      field: "experimental.themes"
      type: "string|array"
      scope: plugin
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex has no color-theme feature. Dropped."
    source: "https://code.claude.com/docs/en/plugins-reference"

  - id: plugins.experimental.monitors
    claude:
      field: "experimental.monitors"
      type: "string|array"
      scope: plugin
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Codex has no background-monitor feature. Dropped."
    source: "https://code.claude.com/docs/en/plugins-reference"

  - id: plugins.userConfig
    claude:
      field: "userConfig"
      type: "object"
      scope: plugin
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: >
      Codex has no user-configuration prompt feature.
      MCP/LSP/hook configurations that contain `${user_config.KEY}` variable references
      will have unresolved variables after conversion, requiring additional warnings.
      `CLAUDE_PLUGIN_OPTION_<KEY>` environment variable exports also do not function in Codex.
    source: "https://code.claude.com/docs/en/plugins-reference"

  - id: plugins.channels
    claude:
      field: "channels"
      type: "array"
      scope: plugin
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: >
      Claude's `channels` feature binds MCP servers as conversation-injection channels.
      Conceptually close to Codex's `.app.json` (OAuth/Agent SDK connectors), but the schemas
      differ fundamentally and conversion is not possible. Dropped + warn.
    source: "https://code.claude.com/docs/en/plugins-reference"

  - id: plugins.settings
    claude:
      field: "settings"
      type: "object"
      scope: plugin
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: >
      Claude's `settings` are values merged into user settings when the plugin is enabled.
      Currently only the `agent` and `subagentStatusLine` keys are supported.
      Codex has no plugin-level settings-merge feature. Dropped.
    source: "https://code.claude.com/docs/en/plugins-reference"

  - id: plugins.defaultEnabled
    claude:
      field: "defaultEnabled"
      type: "boolean"
      scope: plugin
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: >
      A rough approximation of "enabled on install" is possible via `policy.installation: INSTALLED_BY_DEFAULT`
      in a Codex marketplace entry, but there is no Codex feature at the individual plugin manifest level
      that corresponds to `defaultEnabled: false`. Lossy + warn.
      Required field as of Claude v2.1.154+.
    source: "https://code.claude.com/docs/en/plugins-reference"

  - id: plugins.dependencies
    claude:
      field: "dependencies"
      type: "array"
      scope: plugin
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: >
      Codex has no plugin dependency-resolution feature.
      The conversion report must note that dependent plugins will need to be installed manually.
    source: "https://code.claude.com/docs/en/plugins-reference"

  # ─── Codex-only interface fields (no Claude equivalent → dropped) ───────────
  - id: plugins.interface.brandColor
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "interface.brandColor"
      type: "string"
      scope: plugin
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: "Claude has no brand-color concept. Dropped on Codex→Claude conversion."
    source: "https://github.com/openai/plugins"

  - id: plugins.interface.composerIcon
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "interface.composerIcon"
      type: "string"
      scope: plugin
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "Dropped on Codex→Claude conversion."
    source: "https://github.com/openai/plugins"

  - id: plugins.interface.logo
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "interface.logo"
      type: "string"
      scope: plugin
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "Dropped on Codex→Claude conversion."
    source: "https://github.com/openai/plugins"

  - id: plugins.interface.capabilities
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "interface.capabilities"
      type: "array[string]"
      scope: plugin
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: >
      Capability declarations for `Interactive` / `Read` / `Write`. Claude has no counterpart.
      Dropped on Codex→Claude conversion.
    source: "https://github.com/openai/plugins"

  - id: plugins.interface.screenshots
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "interface.screenshots"
      type: "array"
      scope: plugin
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "Dropped on Codex→Claude conversion."
    source: "https://github.com/openai/plugins"

  - id: plugins.interface.websiteURL
    claude:
      field: "homepage"
      type: "string"
      scope: plugin
    codex:
      field: "interface.websiteURL"
      type: "string"
      scope: plugin
    direction: codex_to_claude
    loss: lossy
    degrade: null
    transform: "rename"
    warn: true
    notes: >
      Codex→Claude: approximate conversion of `interface.websiteURL` → `homepage`.
      Emit a duplicate warning if Claude already has a `homepage` value.
      Claude→Codex: a near-lossless conversion is possible by also copying `homepage` to `interface.websiteURL`.
    source: "https://github.com/openai/plugins"

  - id: plugins.interface.privacyPolicyURL
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "interface.privacyPolicyURL"
      type: "string"
      scope: plugin
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "No counterpart in Claude. Dropped on Codex→Claude conversion."
    source: "https://github.com/openai/plugins"

  - id: plugins.interface.termsOfServiceURL
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "interface.termsOfServiceURL"
      type: "string"
      scope: plugin
    direction: codex_to_claude
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "No counterpart in Claude. Dropped on Codex→Claude conversion."
    source: "https://github.com/openai/plugins"

  - id: plugins.interface.defaultPrompt
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "interface.defaultPrompt"
      type: "string|array"
      scope: plugin
    direction: codex_to_claude
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: >
      Codex→Claude: can be approximated by appending a note to the skill body (lossy).
      When an array, at most 3 items, each up to 128 characters.
      Claude→Codex: no direct counterpart field (dropped).
    source: "https://github.com/openai/plugins"

  - id: plugins.interface.developerName
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "interface.developerName"
      type: "string"
      scope: plugin
    direction: codex_to_claude
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: >
      Codex→Claude: approximate conversion to `author.name` is possible (lossy).
      Claude→Codex: copy `author.name` to `interface.developerName`.
    source: "https://github.com/openai/plugins"

  - id: plugins.interface.category
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "interface.category"
      type: "string"
      scope: plugin
    direction: codex_to_claude
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: >
      Codex→Claude: can be approximated by appending to the `keywords` array (lossy).
      Claude→Codex: inferring a category from `keywords` is difficult.
    source: "https://github.com/openai/plugins"

  - id: plugins.interface.longDescription
    claude:
      field: "description"
      type: "string"
      scope: plugin
    codex:
      field: "interface.longDescription"
      type: "string"
      scope: plugin
    direction: codex_to_claude
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: >
      Codex→Claude: repurpose `interface.longDescription` as `description` (lossy).
      Claude→Codex: approximate by also copying `description` to `interface.longDescription`.
    source: "https://github.com/openai/plugins"

  # ─── marketplace.json ────────────────────────────────────────────────────────
  - id: plugins.marketplace.path
    claude:
      field: ".claude-plugin/marketplace.json"
      type: "path"
      scope: marketplace
    codex:
      field: ".agents/plugins/marketplace.json"
      type: "path"
      scope: marketplace
    direction: both
    loss: lossless
    degrade: null
    transform: "path:remap"
    warn: false
    notes: >
      Codex uses `.agents/plugins/marketplace.json` as its native path, but also reads
      `.claude-plugin/marketplace.json` for compatibility, so a Claude marketplace structure
      is likely usable in Codex as-is.
      However, normalization of the `source` schema
      (e.g. Claude `relative` → Codex `local`) is still required.
    source: "https://github.com/openai/plugins"

  - id: plugins.marketplace.name
    claude:
      field: "name"
      type: "string"
      scope: marketplace
    codex:
      field: "name"
      type: "string"
      scope: marketplace
    direction: both
    loss: lossless
    degrade: null
    transform: null
    warn: false
    notes: "Required by both sides. Lossless."
    source: null

  - id: plugins.marketplace.owner
    claude:
      field: "owner"
      type: "object{name,email?,url?}"
      scope: marketplace
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: false
    notes: "Codex marketplace has no `owner` field. Dropped on Claude→Codex conversion."
    source: "https://www.schemastore.org/claude-code-marketplace.json"

  - id: plugins.marketplace.interface.displayName
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "interface.displayName"
      type: "string"
      scope: marketplace
    direction: codex_to_claude
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: >
      Codex→Claude: approximate conversion to Claude's `name` or `description` field.
      Claude marketplace has no field equivalent to `interface.displayName`.
    source: "https://github.com/openai/plugins"

  - id: plugins.marketplace.plugins.source
    claude:
      field: "plugins[].source"
      type: "string|object"
      scope: marketplace
    codex:
      field: "plugins[].source"
      type: "object"
      scope: marketplace
    direction: both
    loss: lossy
    degrade: null
    transform: "path:remap"
    warn: true
    notes: >
      Claude source type → Codex source type mapping:
        relative path (string) → `{source:"local",path:"..."}`
        `github` → `github` (fields are largely compatible but `sha` vs `commit` needs verification)
        `url` → `url`
        `git-subdir` → `git-subdir`
        `npm` → no Codex equivalent (dropped + warn)
      Codex → Claude:
        `local` → relative path (string)
        others are largely mappable
      The sha field: Claude uses `sha`, Codex uses `commit` or `sha` (verify at implementation time).
    source: "https://github.com/openai/plugins"

  - id: plugins.marketplace.plugins.policy
    claude:
      field: null
      type: null
      scope: null
    codex:
      field: "plugins[].policy"
      type: "object{installation,authentication,products}"
      scope: marketplace
