notes:
  - >
    Claude and Codex can convert the basic plugin.json metadata
    (name/version/description/author, etc.) between each other nearly losslessly.
    The largest differences are: the Claude-only integration features
    (lspServers/outputStyles/themes/monitors/userConfig/channels/settings/dependencies)
    and the Codex-only UI/brand fields (interface.brandColor/logo/capabilities/screenshots, etc.)
    — neither set has a counterpart on the other side and all are completely dropped.
  - >
    The marketplace `source` schema differs subtly in naming and structure between Claude and Codex
    (e.g. Claude relative path → Codex `{source:"local",...}`).
    The conversion engine must normalize source type names and unify the sha/commit field names.
  - >
    `openai/codex-plugin-cc` is a Claude Code-only plugin (it has `.claude-plugin/plugin.json`).
    It is a one-way bridge that launches Codex CLI as a subprocess from a Claude Code session
    (using commands like `/codex:review` plus a Stop hook as a review gate).
    It is not an example of a hybrid dual-manifest plugin, nor is it installed from the
    Codex plugin marketplace.
    Plugins that support both sides require the dual-manifest strategy
    (`.claude-plugin/plugin.json` + `.codex-plugin/plugin.json`).
  - >
    Codex plugin.json requires `version` as strict semver.
    When converting Claude→Codex and `version` is absent,
    either supply `"0.0.0"` or derive it from the git SHA (a warning is mandatory).
  - >
    The Codex `policy` field is required in marketplace entries.
    On Claude→Codex conversion it is recommended to auto-populate `policy` with defaults
    (installation=AVAILABLE, authentication=ON_INSTALL).
    The conversion report must note that auto-population was performed.
  - >
    Codex Plugins is a new feature added in 2025-2026 and the specification is still evolving.
    Always verify version dependencies together with the `source` URLs.
