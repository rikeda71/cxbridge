    notes: |
      Codex TUI display customization (theme selection, footer status-line items, window
      title), introduced in Codex 0.13x. Claude's `statusLine` renders the output of a shell
      command and accepts no item list, so no mechanical conversion is attempted. Dropped.
    source: "https://developers.openai.com/codex/config-reference"

notes:
  - |
    Full automatic conversion between settings.json and config.toml is not realistic.
    The CLI tool should realistically target only model, effortLevel, env, basic sandbox fields, editorMode, and attribution.
    The conversion report must enumerate all dropped/lossy entries without exception.
  - |
    The permission models are fundamentally different (tool axis vs resource axis).
    Each entry in Claude's `permissions.allow/deny/ask` does not map 1:1 in Codex;
    it must be split into three destinations: filesystem, network.domains, and .rules (execpolicy).
  - |
    hooks and mcpServers are not covered by this yaml's entries.
    See mappings/hooks.yaml (hooks) and mappings/mcp.yaml (MCP).
  - |
    Codex's `sandbox_mode`/`sandbox_workspace_write` (old style) and
    `default_permissions`/`[permissions.*]` (new style) are mutually exclusive. Use the new style for new conversions.
  - |
    Fluid Codex settings specifications (2025-2026 new features: features.memories, features.hooks,
    features.multi_agent, approval_policy.granular, etc.) must have their source URL versions re-verified at implementation time.
