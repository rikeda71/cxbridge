notes:
  - |
    settings.json ⇄ config.toml の完全自動変換は非現実的。
    CLI ツールが現実的に扱える対象は model・effortLevel・env・sandbox 基本項目・editorMode・attribution に絞るべき。
    変換レポートには dropped/lossy 全エントリを必ず列挙すること。
  - |
    権限モデルが根本的に異なる（ツール軸 vs リソース軸）。
    Claude `permissions.allow/deny/ask` の各エントリは Codex で 1:1 対応せず、
    filesystem・network.domains・.rules（execpolicy）の 3 つに分散変換が必要。
  - |
    hooks と mcpServers は本 yaml のエントリ対象外。
    mappings/hooks.yaml（hooks）および mappings/mcp.yaml（MCP）を参照。
  - |
    Codex の `sandbox_mode`/`sandbox_workspace_write`（旧方式）と
    `default_permissions`/`[permissions.*]`（新方式）は排他。新規変換では新方式を推奨。
  - |
    Codex settings のうち流動的な仕様（2025-2026 の新機能: features.memories, features.hooks,
    features.multi_agent, approval_policy.granular 等）は実装時に source URL のバージョンを再検証すること。
