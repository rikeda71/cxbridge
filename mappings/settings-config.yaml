domain: settings-config
title: "Settings & Config (settings.json ⇄ config.toml)"
doc: ../docs/spec.md
files:
  claude:
    - "~/.claude/settings.json"
    - ".claude/settings.json"
    - ".claude/settings.local.json"
    - "managed settings (enterprise)"
  codex:
    - "~/.codex/config.toml"
    - ".codex/config.toml"
    - "~/.codex/<name>.config.toml"
    - "/etc/codex/config.toml"
    - "requirements.toml (managed)"
format:
  claude: [json]
  codex: [toml]
entries:

  # ─── Model / Behavior ────────────────────────────────────────────────

  - id: settings.model
    claude:
      field: "model"
      type: "string"
      scope: user
    codex:
      field: "model"
      type: "string"
      scope: user
    direction: both
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: |
      Model ID formats are entirely different systems (`claude-opus-4-8` ⇔ `gpt-5.x`).
      Mechanical string conversion is not possible. The CLI buckets models into High/Mid/Low
      tiers (model_tiers const table) and emits the canonical name on the other side;
      unknown IDs are copied as-is and noted in the report.
      Claude 5 Mythos-class IDs (`claude-fable-5` / `claude-mythos-5`, also with the `[1m]`
      context suffix) are recognized as High-tier input, but codex_to_claude High always emits
      the Opus ID — Fable/Mythos usage is credit-metered, so converted configs never select it.
    source: "https://code.claude.com/docs/en/settings, https://www.anthropic.com/news/claude-fable-5-mythos-5"

  - id: settings.effortLevel
    claude:
      field: "effortLevel"
      type: "enum(low|medium|high|xhigh|max)"
      scope: user
    codex:
      field: "model_reasoning_effort"
      type: "enum(minimal|low|medium|high|xhigh)"
      scope: user
    direction: both
    loss: lossy
    degrade: null
    transform: "enum_map:{max:xhigh}"
    warn: true
    notes: |
      Claude's `max` does not exist in Codex, so it is rounded to `xhigh` (claude_to_codex).
      Codex's `minimal` has no corresponding value in Claude, so it is dropped (codex_to_claude).
      Lower effort levels (low/medium/high) map 1:1.
    source: "https://developers.openai.com/codex/config-reference"

  - id: settings.language
    claude:
      field: "language"
      type: "string"
      scope: user
    codex:
      field: "developer_instructions"
      type: "string"
      scope: user
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: |
      Codex has no standalone `language` field.
      Approximated by appending a language instruction to `developer_instructions` in natural language
      (e.g., "Always respond in Japanese."). The intent is preserved but the information is lost as a dedicated field.
    source: "https://code.claude.com/docs/en/settings"

  - id: settings.defaultShell
    claude:
      field: "defaultShell"
      type: "enum(bash|powershell)"
      scope: user
    codex:
      field: "shell_environment_policy.experimental_use_profile"
      type: "boolean"
      scope: user
    direction: both
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: |
      The semantics differ. Claude's `defaultShell` selects the shell itself.
      Codex's `experimental_use_profile` controls whether the shell profile is sourced at process startup.
      `defaultShell: "bash"` → `experimental_use_profile=false` is the default, so almost no conversion is needed.
      `defaultShell: "powershell"` is Windows-only and has no clear Codex counterpart (lossy).
    source: "https://developers.openai.com/codex/config-reference"

  - id: settings.outputStyle
    claude:
      field: "outputStyle"
      type: "string"
      scope: user
    codex:
      field: "developer_instructions"
      type: "string"
      scope: user
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: |
      Codex has no standalone outputStyle field.
      Can be approximated by appending to `developer_instructions`.
    source: "https://code.claude.com/docs/en/settings"

  # ─── Permissions: Bash Commands ─────────────────────────────────────────

  - id: settings.permissions.allow.bash
    claude:
      field: "permissions.allow"
      type: "string[]"
      scope: user
    codex:
      field: "[permissions.<name>] rules execpolicy allow"
      type: "object"
      scope: project
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: project
      target: ".codex/rules/default.rules (prefix_rule decision=\"allow\")"
    transform: null
    warn: true
    notes: |
      Converts Claude's `permissions.allow: ["Bash(npm run *)"]` pattern to
      Codex's `.rules` file `prefix_rule(pattern=[...], decision="allow")`.
      The original skill scope expands to project/session scope, so a warning must always be emitted.
      `features.hooks=true` and project trust are also required.
      Pre-approval of built-in tools (AskUserQuestion, etc.) has no alternative → dropped.
    source: "https://developers.openai.com/codex/permissions"

  - id: settings.permissions.deny.bash
    claude:
      field: "permissions.deny"
      type: "string[]"
      scope: user
    codex:
      field: "[permissions.<name>] rules execpolicy forbidden"
      type: "object"
      scope: project
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: project
      target: ".codex/rules/default.rules (prefix_rule decision=\"forbidden\")"
    transform: null
    warn: true
    notes: |
      Converts Claude's `permissions.deny: ["Bash(rm -rf *)"]` to
      Codex `.rules` `prefix_rule decision="forbidden"`.
      Denial of built-in tools (AskUserQuestion, etc.) has no alternative → dropped.
      Scope expands, so a warning is mandatory.
    source: "https://developers.openai.com/codex/permissions"

  - id: settings.permissions.ask.bash
    claude:
      field: "permissions.ask"
      type: "string[]"
      scope: user
    codex:
      field: "[permissions.<name>] rules execpolicy prompt"
      type: "object"
      scope: project
    direction: claude_to_codex
    loss: lossy
    degrade:
      to: project
      target: ".codex/rules/default.rules (prefix_rule decision=\"prompt\")"
    transform: null
    warn: true
    notes: |
      Converts Claude's `permissions.ask: ["Bash(git push *)"]` to
      Codex `.rules` `prefix_rule decision="prompt"`.
      `approval_policy.granular.rules=true` is also required.
      Lossy due to differing granularity. Warning mandatory because scope expands.
    source: "https://developers.openai.com/codex/permissions"

  # ─── Permissions: Filesystem ──────────────────────────────────────

  - id: settings.permissions.allow.read
    claude:
      field: "permissions.allow"
      type: "string[]"
      scope: user
    codex:
      field: "permissions.<name>.filesystem.<path>"
      type: "string(\"read\")"
      scope: user
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: "format:json_to_toml"
    warn: true
    notes: |
      Claude `permissions.allow: ["Read(~/docs)"]` → Codex `[permissions.X].filesystem."~/docs"="read"`.
      Converts from a tool axis (Read) to a resource axis (filesystem path).
      The tool boundary between Read/Write/Edit in Claude is not distinguished in Codex, which is lossy.
      Path normalization (e.g., expanding `~/`) is required.
    source: "https://developers.openai.com/codex/permissions"

  - id: settings.permissions.deny.read
    claude:
      field: "permissions.deny"
      type: "string[]"
      scope: user
    codex:
      field: "permissions.<name>.filesystem.<path>"
      type: "string(\"deny\")"
      scope: user
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: "format:json_to_toml"
    warn: true
    notes: |
      Claude `permissions.deny: ["Read(~/.env)"]` → Codex `[permissions.X].filesystem."~/.env"="deny"`.
      Both Read and Write denials collapse into a single `deny` entry in Codex, making this lossy.
    source: "https://developers.openai.com/codex/permissions"

  - id: settings.permissions.allow.write
    claude:
      field: "permissions.allow"
      type: "string[]"
      scope: user
    codex:
      field: "permissions.<name>.filesystem.<path>"
      type: "string(\"write\")"
      scope: user
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: "format:json_to_toml"
    warn: true
    notes: |
      Claude `permissions.allow: ["Write(/tmp/build)"]` → Codex `[permissions.X].filesystem."/tmp/build"="write"`.
      The distinction between Read/Write/Edit tools is lost (Codex write = read + write + delete).
    source: "https://developers.openai.com/codex/permissions"

  # ─── Permissions: Network ─────────────────────────────────────────

  - id: settings.permissions.allow.webfetch
    claude:
      field: "permissions.allow"
      type: "string[]"
      scope: user
    codex:
      field: "permissions.<name>.network.domains.<domain>"
      type: "string(\"allow\")"
      scope: user
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: "format:json_to_toml"
    warn: true
    notes: |
      Claude `permissions.allow: ["WebFetch(domain:api.example.com)"]` →
      Codex `[permissions.X].network.domains."api.example.com"="allow"`.
      Converts a string array to a TOML table keyed by domain.
      Verify the wildcard notation: Claude uses (`*.example.com`) vs Codex (`*.example.com`/`**.example.com`).
      `network.enabled=true` is also required.
    source: "https://developers.openai.com/codex/permissions"

  - id: settings.permissions.deny.webfetch
    claude:
      field: "permissions.deny"
      type: "string[]"
      scope: user
    codex:
      field: "permissions.<name>.network.domains.<domain>"
      type: "string(\"deny\")"
      scope: user
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: "format:json_to_toml"
    warn: false
    notes: |
      Claude `permissions.deny: ["WebFetch(domain:bad.com)"]` →
      Codex `[permissions.X].network.domains."bad.com"="deny"`.
      By default Codex blocks local addresses and similar, so explicit denials act as additional protection.
    source: "https://developers.openai.com/codex/permissions"

  # ─── Permissions: defaultMode ──────────────────────────────────────────

  - id: settings.permissions.defaultMode.default
    claude:
      field: "permissions.defaultMode"
      type: "enum(default)"
      scope: user
    codex:
      field: "approval_policy + sandbox_mode"
      type: "string"
      scope: user
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: |
      Claude `defaultMode: "default"` → Codex `approval_policy="on-request"` + `sandbox_mode="workspace-write"`
      (Codex documented defaults). Both prompt on boundary crossing within a writable workspace.
      Lossy: Claude's single default axis collapses to two orthogonal Codex axes (1-axis → 2-axis).
    source: "https://developers.openai.com/codex/agent-approvals-security"

  - id: settings.permissions.defaultMode.bypassPermissions
    claude:
      field: "permissions.defaultMode"
      type: "enum(bypassPermissions)"
      scope: user
    codex:
      field: "approval_policy + sandbox_mode"
      type: "string"
      scope: user
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: |
      Claude `defaultMode: "bypassPermissions"` → Codex `approval_policy="never"` + `sandbox_mode="danger-full-access"`.
      This combination removes both the approval prompt layer and the sandbox boundary, granting fully
      unrestricted execution. Not fully equivalent to Claude's bypassPermissions (which bypasses Claude's
      internal permission checks); requires combining two Codex fields. Explicit security risk — must be
      stated in the conversion warning.
    source: "https://developers.openai.com/codex/agent-approvals-security"

  - id: settings.permissions.defaultMode.acceptEdits
    claude:
      field: "permissions.defaultMode"
      type: "enum(acceptEdits)"
      scope: user
    codex:
      field: "approval_policy + sandbox_mode"
      type: "string"
      scope: user
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: |
      Claude `defaultMode: "acceptEdits"` auto-approves edit-class tools (file writes, edits).
      Approximated by Codex `approval_policy="on-request"` + `sandbox_mode="workspace-write"`:
      edits within the workspace proceed without per-operation prompts; operations that cross sandbox
      boundaries still escalate. Lossy: the edit-class auto-approval granularity is not preserved.
    source: "https://developers.openai.com/codex/agent-approvals-security"

  - id: settings.permissions.defaultMode.auto
    claude:
      field: "permissions.defaultMode"
      type: "enum(auto)"
      scope: user
    codex:
      field: "approval_policy + sandbox_mode"
      type: "string"
      scope: user
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: |
      Claude `defaultMode: "auto"` → Codex `approval_policy="on-request"` + `sandbox_mode="workspace-write"`
      (Codex defaults). Both prompt on boundary crossing within a writable workspace. Lossy: the exact
      boundary conditions differ between Claude's auto mode and Codex's on-request policy.
    source: "https://developers.openai.com/codex/agent-approvals-security"

  - id: settings.permissions.defaultMode.plan
    claude:
      field: "permissions.defaultMode"
      type: "enum(plan)"
      scope: user
    codex:
      field: "approval_policy + sandbox_mode"
      type: "string"
      scope: user
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: |
      Claude `defaultMode: "plan"` approximated by Codex `sandbox_mode="read-only"` + `approval_policy="on-request"` —
      the closest Codex equivalent. Codex has no true "plan mode"; the read-only sandbox enforces
      investigate-without-changes behavior. Lossy: the semantic distinction between planning and executing
      is not preserved on the Codex side.
    source: "https://developers.openai.com/codex/agent-approvals-security"

  - id: settings.permissions.defaultMode.dontAsk
    claude:
      field: "permissions.defaultMode"
      type: "enum(dontAsk)"
      scope: user
    codex:
      field: "approval_policy + sandbox_mode"
      type: "string"
      scope: user
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: |
      Claude `defaultMode: "dontAsk"` suppresses permission prompts but retains Claude's internal
      guardrails. Mapped to Codex `approval_policy="never"` + `sandbox_mode="workspace-write"`.
      This is more faithful and safer than danger-full-access: the workspace sandbox boundary is
      preserved, preventing writes outside the workspace even without approval prompts.
      Still an approximation — Codex does not have a guardrail layer equivalent to Claude's internal
      safety checks. Lossy.
    source: "https://developers.openai.com/codex/agent-approvals-security"

  # ─── Sandbox ─────────────────────────────────────────────

  - id: settings.sandbox.filesystem.allowWrite
    claude:
      field: "sandbox.filesystem.allowWrite"
      type: "string[]"
      scope: user
    codex:
      field: "permissions.<name>.filesystem.<path> or sandbox_workspace_write.writable_roots"
      type: "object/string[]"
      scope: user
    direction: both
    loss: lossy
    degrade: null
    transform: "format:json_to_toml"
    warn: true
    notes: |
      Converts Claude string array → Codex TOML table (paths as keys, `"write"` as values).
      The conversion target should consistently use either the new style (`default_permissions` + `[permissions.*]`)
      or the old style (`sandbox_workspace_write.writable_roots`). Using both simultaneously causes Codex to apply only one.
    source: "https://developers.openai.com/codex/permissions"

  - id: settings.sandbox.filesystem.denyWrite
    claude:
      field: "sandbox.filesystem.denyWrite"
      type: "string[]"
      scope: user
    codex:
      field: "permissions.<name>.filesystem.<path>"
      type: "string(\"deny\")"
      scope: user
    direction: both
    loss: lossy
    degrade: null
    transform: "format:json_to_toml"
    warn: false
    notes: |
      Converts Claude array → key/value pairs in the Codex `[permissions.X].filesystem` table.
      Lossy because read and write denials are merged into a single entry (Claude can deny write-only).
    source: "https://developers.openai.com/codex/permissions"

  - id: settings.sandbox.filesystem.allowRead
    claude:
      field: "sandbox.filesystem.allowRead"
      type: "string[]"
      scope: user
    codex:
      field: "permissions.<name>.filesystem.<path>"
      type: "string(\"read\")"
      scope: user
    direction: both
    loss: lossy
    degrade: null
    transform: "format:json_to_toml"
    warn: false
    notes: |
      Converts Claude array → Codex `[permissions.X].filesystem` table.
    source: "https://developers.openai.com/codex/permissions"

  - id: settings.sandbox.filesystem.denyRead
    claude:
      field: "sandbox.filesystem.denyRead"
      type: "string[]"
      scope: user
    codex:
      field: "permissions.<name>.filesystem.<path>"
      type: "string(\"deny\")"
      scope: user
    direction: both
    loss: lossy
    degrade: null
    transform: "format:json_to_toml"
    warn: false
    notes: |
      Lossy because read and write denials are merged (Claude allows specifying denyRead independently).
    source: "https://developers.openai.com/codex/permissions"

  - id: settings.sandbox.network.allowedDomains
    claude:
      field: "sandbox.network.allowedDomains"
      type: "string[]"
      scope: user
    codex:
      field: "permissions.<name>.network.domains"
      type: "object"
      scope: user
    direction: both
    loss: lossy
    degrade: null
    transform: "format:json_to_toml"
    warn: true
    notes: |
      Converts Claude string array (`["api.example.com", "*.cdn.net"]`) →
      Codex TOML table (`"api.example.com"="allow"`, `"*.cdn.net"="allow"`) (inverse of `str_to_list`).
      Pay attention to wildcard semantics (`*` vs `**`). `network.enabled=true` is also required.
    source: "https://developers.openai.com/codex/permissions"

  - id: settings.sandbox.network.allowAllUnixSockets
    claude:
      field: "sandbox.network.allowAllUnixSockets"
      type: "boolean"
      scope: user
    codex:
      field: "features.network_proxy.dangerously_allow_all_unix_sockets"
      type: "boolean"
      scope: user
    direction: both
    loss: lossless
    degrade: null
    transform: "rename"
    warn: true
    notes: |
      Field rename only. Meaning and type are identical (lossless).
      The Codex field is nested under `features.network_proxy`, not top-level:
      `features.network_proxy.dangerously_allow_all_unix_sockets` (feature-toggle form).
      The per-profile equivalent is `permissions.<name>.network.dangerously_allow_all_unix_sockets`.
      This is a dangerous setting as indicated by the `dangerously_` prefix, so a warning is emitted.
    source: "https://developers.openai.com/codex/concepts/sandboxing"

  - id: settings.sandbox.network.allowMachLookup
    claude:
      field: "sandbox.network.allowMachLookup"
      type: "string[]"
      scope: user
    codex:
      field: null
      type: null
      scope: null
    direction: claude_to_codex
    loss: dropped
    degrade: null
    transform: null
    warn: true
    notes: |
      macOS-specific Mach lookup allowlist. Codex has no corresponding field.
      Must be noted as dropped in the conversion report.
    source: "https://code.claude.com/docs/en/settings"

  # ─── Environment Variables ──────────────────────────────────────────────────

  - id: settings.env
    claude:
      field: "env"
      type: "object"
      scope: user
    codex:
      field: "shell_environment_policy.set"
      type: "object"
      scope: user
    direction: both
    loss: lossy
    degrade: null
    transform: "format:json_to_toml"
    warn: true
    notes: |
      Claude's `env` injects into the entire session (including the Claude process itself).
      Codex's `shell_environment_policy.set` injects into subprocesses (Bash, etc.) only.
      Variables referenced by Claude itself (e.g., `ANTHROPIC_API_KEY`) are not affected by
      `shell_environment_policy` on the Codex side. The scope difference must be stated in the conversion report.
      Additionally, Codex's `inherit` (`all`/`core`/`none`), `exclude`, and `include_only` have no Claude counterpart.
    source: "https://developers.openai.com/codex/config-advanced"

  # ─── Hooks / MCP (see separate documents) ──────────────────────────

  # hooks and mcpServers are not covered by this yaml's entries.
  # See mappings/hooks.yaml / mappings/mcp.yaml for details.

  # ─── Memory / Session Management ────────────────────────────────────

  - id: settings.autoMemoryEnabled
    claude:
      field: "autoMemoryEnabled"
      type: "boolean"
      scope: user
    codex:
      field: "memories.use_memories + memories.generate_memories"
      type: "boolean"
      scope: user
    direction: both
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: |
      Claude's single field maps to two Codex fields (use_memories + generate_memories).
      Both set to true is equivalent to Claude's `autoMemoryEnabled: true`.
      `features.memories=true` is also required separately.
    source: "https://developers.openai.com/codex/config-reference"

  - id: settings.cleanupPeriodDays
    claude:
      field: "cleanupPeriodDays"
      type: "integer"
      scope: user
    codex:
      field: "memories.max_rollout_age_days"
      type: "integer"
      scope: user
    direction: both
    loss: lossy
    degrade: null
    transform: null
    warn: true
    notes: |
      Claude represents the number of days to retain sessions (minimum 1).
      Codex's `memories.max_rollout_age_days` is the maximum age in days of threads eligible for memory generation (0-90), which is close in meaning.
      However, `history.max_bytes` (a byte limit) has an entirely different meaning.
      The conversion target should use `memories.max_rollout_age_days` and clamp the value to the range 0-90.
    source: "https://developers.openai.com/codex/config-reference"

  # ─── Git / Attribution ──────────────────────────────────────────────────

  - id: settings.attribution.commit
    claude:
      field: "attribution.commit"
      type: "string"
      scope: user
    codex:
      field: "commit_attribution"
      type: "string"
      scope: user
    direction: both
    loss: lossy
    degrade: null
    transform: "rename"
    warn: false
    notes: |
      Rename only. Meaning is close, but note format differences.
      Claude accepts a free-form co-authored-by string; Codex recommends `Name <email>` format.
      Treat as lossy when the formats differ.
    source: "https://developers.openai.com/codex/config-reference"

  - id: settings.includeCoAuthoredBy
    claude:
      field: "includeCoAuthoredBy"
      type: "boolean"
      scope: user
    codex:
      field: "commit_attribution"
      type: "string"
      scope: user
    direction: claude_to_codex
    loss: lossy
    degrade: null
    transform: null
    warn: false
    notes: |
      Deprecated field.
      `includeCoAuthoredBy: false` → approximated by `commit_attribution=""` to disable attribution.
      `includeCoAuthoredBy: true` → the Codex side retains its default value (`"Codex <noreply@openai.com>"`).
    source: "https://code.claude.com/docs/en/settings"

  # ─── UI / Editor ─────────────────────────────────────────────

  - id: settings.editorMode
    claude:
      field: "editorMode"
      type: "enum(normal|vim)"
      scope: user
    codex:
      field: "tui.vim_mode_default"
      type: "boolean"
      scope: user
    direction: both
    loss: lossless
    degrade: null
    transform: "enum_map:{vim:true,normal:false}"
    warn: false
    notes: |
      Claude `editorMode: "vim"` ⇔ Codex `tui.vim_mode_default=true`.
